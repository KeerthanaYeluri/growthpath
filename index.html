<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Booth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .glass-strong {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .glow { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
        .glow-green { box-shadow: 0 0 40px rgba(16,185,129,0.15); }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thinking-dot { animation: thinkBounce 1.4s ease-in-out infinite; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes thinkBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }
        .scanline {
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px
            );
        }
        textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QUESTIONS_DB = {
            "Software Engineer": [
                "Tell me about a challenging technical problem you solved recently. What was your approach and what did you learn?",
                "How do you ensure code quality in your projects? Walk me through your testing and review process.",
                "Describe a time you had to make a significant architectural decision. What trade-offs did you consider?",
                "How do you stay current with new technologies? Give me an example of something you recently learned and applied.",
                "Tell me about a time you disagreed with a team member on a technical approach. How did you resolve it?"
            ],
            "Data Scientist": [
                "Walk me through your end-to-end process for a machine learning project, from problem definition to deployment.",
                "How do you handle imbalanced datasets? Give me a real example from your experience.",
                "Describe a time when your model performed well in testing but poorly in production. What happened?",
                "How do you communicate complex analytical findings to non-technical stakeholders?",
                "Tell me about a project where you had to choose between model accuracy and interpretability. What did you decide?"
            ],
            "Product Manager": [
                "How do you prioritize features when you have limited engineering resources and multiple stakeholder requests?",
                "Walk me through how you would define success metrics for a new product launch.",
                "Tell me about a time you had to kill a feature or pivot a product direction. How did you handle it?",
                "How do you gather and validate user feedback? Give me a specific example.",
                "Describe a situation where engineering and design disagreed on an approach. How did you mediate?"
            ],
            "default": [
                "Tell me about yourself and why you're interested in this role.",
                "What is your greatest professional achievement, and what made it significant?",
                "Describe a challenging situation at work and how you handled it. What was the outcome?",
                "Where do you see yourself in 5 years, and how does this role fit into your career goals?",
                "Do you have any questions for us about the team, culture, or the role itself?"
            ]
        };

        function getQuestions(jobTitle) {
            const key = Object.keys(QUESTIONS_DB).find(
                k => jobTitle.toLowerCase().includes(k.toLowerCase())
            );
            return QUESTIONS_DB[key] || QUESTIONS_DB["default"];
        }

        function generateScore(answers) {
            let total = 0;
            const perQ = answers.map(a => {
                const len = a.trim().length;
                let s = 0;
                if (len > 200) s = 75 + Math.floor(Math.random() * 20);
                else if (len > 100) s = 60 + Math.floor(Math.random() * 20);
                else if (len > 30) s = 45 + Math.floor(Math.random() * 20);
                else if (len > 0) s = 25 + Math.floor(Math.random() * 15);
                else s = 0;
                total += s;
                return Math.min(s, 100);
            });
            return { overall: Math.min(Math.round(total / 5), 100), perQuestion: perQ };
        }

        function generateFeedback(score) {
            const strengths = score >= 70
                ? ["Strong communication and articulation", "Good use of specific examples", "Confident and structured responses"]
                : score >= 45
                ? ["Shows genuine interest in the role", "Provides relevant context in answers", "Demonstrates self-awareness"]
                : ["Willingness to attempt all questions", "Shows potential for growth", "Engages with the interview process"];

            const improvements = score >= 70
                ? ["Quantify achievements with metrics where possible", "Add more detail about team collaboration impact", "Prepare concise summaries for complex topics"]
                : score >= 45
                ? ["Expand answers with the STAR method (Situation, Task, Action, Result)", "Include more specific examples from past experience", "Practice structuring longer, more detailed responses"]
                : ["Prepare 2-3 detailed stories for common questions", "Practice speaking about experiences for at least 60 seconds each", "Research the company and role to tailor your answers"];

            return { strengths, improvements };
        }

        // --- Components ---

        function CameraPreview() {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);
            return (
                <div className="fixed bottom-6 right-6 z-50">
                    <div className="glass rounded-xl overflow-hidden w-44 shadow-2xl">
                        <div className="bg-slate-800 h-28 flex items-center justify-center relative scanline">
                            <div className="text-center">
                                <div className="w-10 h-10 rounded-full bg-slate-700 mx-auto mb-1 flex items-center justify-center">
                                    <svg className="w-5 h-5 text-slate-500" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clipRule="evenodd"/>
                                    </svg>
                                </div>
                                <p className="text-slate-500 text-xs">Camera Feed</p>
                            </div>
                            <div className="absolute top-2 left-2 flex items-center gap-1">
                                <div className="w-2 h-2 rounded-full bg-red-500 pulse-dot"></div>
                                <span className="text-red-400 text-[9px] font-medium">REC</span>
                            </div>
                        </div>
                        <div className="px-2 py-1.5 flex items-center justify-between">
                            <span className="text-slate-500 text-[10px]">LIVE</span>
                            <span className="text-slate-400 text-[10px] font-mono">
                                {time.toLocaleTimeString()}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        function HomeScreen({ onStart }) {
            const [name, setName] = useState("");
            const [jobTitle, setJobTitle] = useState("");

            return (
                <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                    <div className="glass-strong rounded-2xl p-10 max-w-lg w-full glow">
                        {/* Logo */}
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 rounded-2xl bg-indigo-500/20 mx-auto mb-4 flex items-center justify-center">
                                <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                                        d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                                </svg>
                            </div>
                            <h1 className="text-3xl font-bold text-white mb-1">AI Interview Booth</h1>
                            <p className="text-slate-400 text-sm">Practice makes perfect. Let's get started.</p>
                        </div>

                        {/* Form */}
                        <div className="space-y-5">
                            <div>
                                <label className="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider">Your Name</label>
                                <input
                                    type="text"
                                    value={name}
                                    onChange={e => setName(e.target.value)}
                                    placeholder="Enter your full name"
                                    className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 transition-all"
                                />
                            </div>
                            <div>
                                <label className="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider">Job Title</label>
                                <input
                                    type="text"
                                    value={jobTitle}
                                    onChange={e => setJobTitle(e.target.value)}
                                    placeholder="e.g. Software Engineer, Data Scientist"
                                    className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 transition-all"
                                />
                            </div>
                            <button
                                onClick={() => name.trim() && jobTitle.trim() && onStart(name.trim(), jobTitle.trim())}
                                disabled={!name.trim() || !jobTitle.trim()}
                                className="w-full py-3.5 rounded-xl font-semibold text-sm tracking-wide transition-all duration-300 disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30"
                            >
                                Start Interview
                            </button>
                        </div>

                        <p className="text-center text-slate-600 text-xs mt-6">5 questions &middot; ~10 minutes &middot; Instant scorecard</p>
                    </div>
                </div>
            );
        }

        function InterviewRoom({ name, jobTitle, onFinish }) {
            const [currentQ, setCurrentQ] = useState(0);
            const [answer, setAnswer] = useState("");
            const [answers, setAnswers] = useState([]);
            const [thinking, setThinking] = useState(false);
            const questions = useRef(getQuestions(jobTitle)).current;
            const textareaRef = useRef(null);

            useEffect(() => {
                if (!thinking && textareaRef.current) textareaRef.current.focus();
            }, [currentQ, thinking]);

            const handleSubmit = () => {
                if (thinking) return;
                const newAnswers = [...answers, answer];
                setThinking(true);

                setTimeout(() => {
                    setThinking(false);
                    if (currentQ < 4) {
                        setAnswers(newAnswers);
                        setAnswer("");
                        setCurrentQ(currentQ + 1);
                    } else {
                        onFinish(newAnswers);
                    }
                }, 2000);
            };

            const progress = ((currentQ + 1) / 5) * 100;

            return (
                <div className="min-h-screen flex flex-col p-4 md:p-8 fade-in">
                    {/* Top Bar */}
                    <div className="glass rounded-xl px-5 py-3 flex items-center justify-between mb-6">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center">
                                <svg className="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                                </svg>
                            </div>
                            <div>
                                <p className="text-white text-sm font-medium">{name}</p>
                                <p className="text-slate-500 text-xs">{jobTitle} Interview</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-indigo-400 text-sm font-semibold">Question {currentQ + 1} of 5</p>
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="w-full bg-slate-800/50 rounded-full h-1.5 mb-8">
                        <div
                            className="bg-gradient-to-r from-indigo-500 to-purple-500 h-1.5 rounded-full transition-all duration-700 ease-out"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 max-w-3xl w-full mx-auto flex flex-col">
                        {/* Interviewer Bubble */}
                        <div className="glass-strong rounded-2xl p-6 mb-6 glow fade-in" key={currentQ}>
                            <div className="flex items-start gap-4">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex-shrink-0 flex items-center justify-center">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                                    </svg>
                                </div>
                                <div>
                                    <p className="text-indigo-400 text-xs font-semibold mb-2 uppercase tracking-wider">AI Interviewer</p>
                                    {thinking ? (
                                        <div className="flex items-center gap-1.5 py-2">
                                            <div className="w-2 h-2 rounded-full bg-indigo-400 thinking-dot"></div>
                                            <div className="w-2 h-2 rounded-full bg-indigo-400 thinking-dot"></div>
                                            <div className="w-2 h-2 rounded-full bg-indigo-400 thinking-dot"></div>
                                            <span className="text-slate-500 text-sm ml-2">Analyzing your response...</span>
                                        </div>
                                    ) : (
                                        <p className="text-slate-200 text-base leading-relaxed">{questions[currentQ]}</p>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Answer Area */}
                        <div className="flex-1 flex flex-col">
                            <div className="glass rounded-2xl p-1 flex-1 flex flex-col mb-4">
                                <textarea
                                    ref={textareaRef}
                                    value={answer}
                                    onChange={e => setAnswer(e.target.value)}
                                    disabled={thinking}
                                    placeholder="Type your answer here... Be specific and use examples from your experience."
                                    className="flex-1 min-h-[160px] bg-transparent rounded-xl px-5 py-4 text-white placeholder-slate-600 resize-none text-sm leading-relaxed disabled:opacity-40"
                                />
                            </div>

                            <div className="flex items-center justify-between">
                                <p className="text-slate-600 text-xs">
                                    {answer.length > 0 ? `${answer.length} characters` : "Tip: Aim for 100+ characters for best results"}
                                </p>
                                <button
                                    onClick={handleSubmit}
                                    disabled={thinking || !answer.trim()}
                                    className="px-8 py-3 rounded-xl font-semibold text-sm transition-all duration-300 disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20"
                                >
                                    {thinking ? "Processing..." : currentQ === 4 ? "Finish Interview" : "Submit Answer"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ResultsPage({ name, jobTitle, answers, onRestart }) {
            const { overall, perQuestion } = generateScore(answers);
            const { strengths, improvements } = generateFeedback(overall);
            const [animatedScore, setAnimatedScore] = useState(0);

            useEffect(() => {
                let start = 0;
                const end = overall;
                const duration = 1500;
                const step = duration / end;
                const timer = setInterval(() => {
                    start += 1;
                    setAnimatedScore(start);
                    if (start >= end) clearInterval(timer);
                }, step);
                return () => clearInterval(timer);
            }, [overall]);

            const scoreColor = overall >= 75 ? "text-emerald-400" : overall >= 50 ? "text-amber-400" : "text-red-400";
            const scoreBg = overall >= 75 ? "from-emerald-500/20 to-emerald-500/5" : overall >= 50 ? "from-amber-500/20 to-amber-500/5" : "from-red-500/20 to-red-500/5";
            const scoreGlow = overall >= 75 ? "glow-green" : "glow";

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 fade-in">
                    <div className="max-w-2xl w-full">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <p className="text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-2">Interview Complete</p>
                            <h1 className="text-3xl font-bold text-white mb-1">Your Scorecard</h1>
                            <p className="text-slate-500 text-sm">{name} &middot; {jobTitle}</p>
                        </div>

                        {/* Score Card */}
                        <div className={`glass-strong rounded-2xl p-8 text-center mb-6 ${scoreGlow}`}>
                            <div className={`inline-flex items-center justify-center w-32 h-32 rounded-full bg-gradient-to-b ${scoreBg} mb-4`}>
                                <div>
                                    <span className={`text-5xl font-extrabold ${scoreColor}`}>{animatedScore}</span>
                                    <span className="text-slate-500 text-lg font-medium">/100</span>
                                </div>
                            </div>
                            <p className="text-slate-400 text-sm">
                                {overall >= 75 ? "Excellent performance! You're well-prepared." :
                                 overall >= 50 ? "Good effort! A few areas to refine." :
                                 "Keep practicing! You'll improve with preparation."}
                            </p>
                        </div>

                        {/* Per-question breakdown */}
                        <div className="glass rounded-2xl p-6 mb-6">
                            <h3 className="text-white text-sm font-semibold mb-4 uppercase tracking-wider">Question Breakdown</h3>
                            <div className="space-y-3">
                                {perQuestion.map((s, i) => (
                                    <div key={i} className="flex items-center gap-3">
                                        <span className="text-slate-500 text-xs w-8">Q{i+1}</span>
                                        <div className="flex-1 bg-slate-800/50 rounded-full h-2">
                                            <div
                                                className={`h-2 rounded-full transition-all duration-1000 ${s >= 75 ? 'bg-emerald-500' : s >= 50 ? 'bg-amber-500' : 'bg-red-500'}`}
                                                style={{ width: `${s}%`, transitionDelay: `${i * 200}ms` }}
                                            ></div>
                                        </div>
                                        <span className="text-slate-400 text-xs font-mono w-8">{s}%</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Strengths & Improvements */}
                        <div className="grid md:grid-cols-2 gap-4 mb-8">
                            <div className="glass rounded-2xl p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-6 h-6 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                                        <svg className="w-3.5 h-3.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.5 12.75l6 6 9-13.5"/>
                                        </svg>
                                    </div>
                                    <h3 className="text-white text-sm font-semibold uppercase tracking-wider">Strengths</h3>
                                </div>
                                <ul className="space-y-2.5">
                                    {strengths.map((s, i) => (
                                        <li key={i} className="flex items-start gap-2">
                                            <span className="text-emerald-500 mt-1">&#8226;</span>
                                            <span className="text-slate-300 text-sm">{s}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="glass rounded-2xl p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-6 h-6 rounded-lg bg-amber-500/20 flex items-center justify-center">
                                        <svg className="w-3.5 h-3.5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                                        </svg>
                                    </div>
                                    <h3 className="text-white text-sm font-semibold uppercase tracking-wider">Top 3 Improvements</h3>
                                </div>
                                <ul className="space-y-2.5">
                                    {improvements.map((s, i) => (
                                        <li key={i} className="flex items-start gap-2">
                                            <span className="text-amber-500 text-sm font-bold mt-0.5">{i+1}.</span>
                                            <span className="text-slate-300 text-sm">{s}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Restart */}
                        <div className="text-center">
                            <button
                                onClick={onRestart}
                                className="px-8 py-3.5 rounded-xl font-semibold text-sm bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 transition-all duration-300"
                            >
                                Restart Interview
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [screen, setScreen] = useState("home");
            const [name, setName] = useState("");
            const [jobTitle, setJobTitle] = useState("");
            const [answers, setAnswers] = useState([]);

            const handleStart = (n, j) => {
                setName(n);
                setJobTitle(j);
                setScreen("interview");
            };

            const handleFinish = (ans) => {
                setAnswers(ans);
                setScreen("results");
            };

            const handleRestart = () => {
                setScreen("home");
                setName("");
                setJobTitle("");
                setAnswers([]);
            };

            return (
                <div className="relative">
                    <CameraPreview />
                    {screen === "home" && <HomeScreen onStart={handleStart} />}
                    {screen === "interview" && <InterviewRoom name={name} jobTitle={jobTitle} onFinish={handleFinish} />}
                    {screen === "results" && <ResultsPage name={name} jobTitle={jobTitle} answers={answers} onRestart={handleRestart} />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
