const { useState, useEffect, useRef, useCallback } = React;
const API = window.location.origin + "/api";

// ─── Auth Helper ───
function getToken() { return localStorage.getItem("gp_token"); }
function setToken(t) { localStorage.setItem("gp_token", t); }
function clearAuth() { localStorage.removeItem("gp_token"); localStorage.removeItem("gp_user"); }
function getUser() { try { return JSON.parse(localStorage.getItem("gp_user")); } catch { return null; } }
function setUser(u) { localStorage.setItem("gp_user", JSON.stringify(u)); }

function authHeaders() {
    const t = getToken();
    return t ? { "Authorization": `Bearer ${t}`, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
}

async function apiFetch(url, options = {}) {
    const res = await fetch(`${API}${url}`, {
        ...options,
        headers: { ...authHeaders(), ...(options.headers || {}) },
    });
    if (res.status === 401) {
        clearAuth();
        window.location.reload();
        throw new Error("Session expired");
    }
    return res;
}

                </svg>

}

// ─── Hooks ───

function useTimer() {
    const [seconds, setSeconds] = useState(0);
    const [running, setRunning] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        if (running) ref.current = setInterval(() => setSeconds(s => s + 1), 1000);
        return () => clearInterval(ref.current);
    }, [running]);
    const start = () => setRunning(true);
    const stop = () => { setRunning(false); clearInterval(ref.current); };
    const format = () => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${h > 0 ? h + ':' : ''}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    };
    return { seconds, start, stop, format, running };
}

function useBrowserSpeech() {
    const [transcript, setTranscript] = useState("");
    const [listening, setListening] = useState(false);
    const [supported, setSupported] = useState(true);
    const recRef = useRef(null);
    const finalRef = useRef("");
    const activeRef = useRef(false);
    useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const rec = new SR();
        rec.continuous = true; rec.interimResults = true; rec.lang = "en-IN"; rec.maxAlternatives = 3;
        rec.onresult = (event) => {
            let interim = "", final = "";
            for (let i = 0; i < event.results.length; i++) {
                let best = event.results[i][0];
                for (let j = 1; j < event.results[i].length; j++) {
                    if (event.results[i][j].confidence > best.confidence) best = event.results[i][j];
                }
                if (event.results[i].isFinal) final += best.transcript + " ";
                else interim = best.transcript;
            }
            if (final) finalRef.current = final;
            setTranscript(finalRef.current + interim);
        };
        rec.onend = () => { if (activeRef.current) { try { rec.start(); } catch(e) {} } else setListening(false); };
        rec.onerror = (e) => {
            if ((e.error === "no-speech" || e.error === "aborted") && activeRef.current) { try { rec.start(); } catch(ex) {} return; }
            activeRef.current = false; setListening(false);
        };
        recRef.current = rec;
    }, []);
    const startListening = () => { finalRef.current = ""; setTranscript(""); activeRef.current = true; try { recRef.current.start(); } catch(e) {} setListening(true); };
    const stopListening = () => { activeRef.current = false; try { recRef.current.stop(); } catch(e) {} setListening(false); };
    const reset = () => { finalRef.current = ""; setTranscript(""); };
    return { transcript, setTranscript, listening, supported, startListening, stopListening, reset, processing: false };
}

function useLocalSpeech(engine) {
    const [transcript, setTranscript] = useState("");
    const [listening, setListening] = useState(false);
    const [processing, setProcessing] = useState(false);
    const mediaRecorderRef = useRef(null);
    const chunksRef = useRef([]);
    const streamRef = useRef(null);
    const intervalRef = useRef(null);
    const fullTranscriptRef = useRef("");
    const sendChunk = async (blob, isFinal) => {
        if (blob.size < 100) return;
        setProcessing(true);
        try {
            const wavBlob = await convertToWav(blob);
            const formData = new FormData();
            formData.append("audio", wavBlob, "chunk.wav");
            formData.append("engine", engine);
            formData.append("is_final", isFinal ? "true" : "false");
            const res = await fetch(`${API}/transcribe/stream`, { method: "POST", body: formData });
            const data = await res.json();
            if (data.transcript) {
                if (isFinal) fullTranscriptRef.current = data.transcript;
                else fullTranscriptRef.current += data.transcript + " ";
                setTranscript(fullTranscriptRef.current.trim());
            }
        } catch (e) { console.error("Transcribe error:", e); }
        setProcessing(false);
    };
    const startListening = async () => {
        fullTranscriptRef.current = ""; setTranscript(""); chunksRef.current = [];
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true } });
            streamRef.current = stream;
            const recorder = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
            mediaRecorderRef.current = recorder;
            let chunkCollector = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) { chunksRef.current.push(e.data); chunkCollector.push(e.data); } };
            recorder.start(500);
            setListening(true);
            intervalRef.current = setInterval(() => {
                if (chunkCollector.length > 0) { const blob = new Blob(chunkCollector, { type: "audio/webm" }); chunkCollector = []; sendChunk(blob, false); }
            }, 4000);
        } catch (e) { console.error("Mic error:", e); }
    };
    const stopListening = async () => {
        clearInterval(intervalRef.current);
        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== "inactive") mediaRecorderRef.current.stop();
        if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
        setListening(false);
        if (chunksRef.current.length > 0) {
            const fullBlob = new Blob(chunksRef.current, { type: "audio/webm" });
            chunksRef.current = [];
            fullTranscriptRef.current = "";
            await sendChunk(fullBlob, true);
        }
    };
    const reset = () => { fullTranscriptRef.current = ""; setTranscript(""); };
    return { transcript, setTranscript, listening, processing, supported: true, startListening, stopListening, reset };
}

function useAudioRecorder() {
    const mediaRecorderRef = useRef(null);
    const streamRef = useRef(null);
    const chunksRef = useRef([]);
    const [recording, setRecording] = useState(false);
    const startRecording = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            streamRef.current = stream;
            const recorder = new MediaRecorder(stream);
            mediaRecorderRef.current = recorder;
            chunksRef.current = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
            recorder.start();
            setRecording(true);
        } catch(e) { console.error("Record error:", e); }
    };
    const stopRecording = () => {
        return new Promise((resolve) => {
            if (!mediaRecorderRef.current || mediaRecorderRef.current.state === "inactive") { resolve(null); return; }
            mediaRecorderRef.current.onstop = () => {
                const blob = new Blob(chunksRef.current, { type: "audio/webm" });
                const url = URL.createObjectURL(blob);
                resolve(url);
            };
            mediaRecorderRef.current.stop();
            if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
            setRecording(false);
        });
    };
    return { recording, startRecording, stopRecording };
}

async function convertToWav(blob) {
    const arrayBuffer = await blob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    let audioBuffer;
    try { audioBuffer = await audioCtx.decodeAudioData(arrayBuffer); } catch(e) { audioCtx.close(); return blob; }
    const sampleRate = 16000;
    const rawData = audioBuffer.getChannelData(0);
    let samples;
    if (audioBuffer.sampleRate !== sampleRate) {
        const ratio = audioBuffer.sampleRate / sampleRate;
        const newLen = Math.round(rawData.length / ratio);
        samples = new Float32Array(newLen);
        for (let i = 0; i < newLen; i++) samples[i] = rawData[Math.round(i * ratio)];
    } else { samples = rawData; }
    const buffer = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buffer);
    const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
    writeStr(0, "RIFF"); view.setUint32(4, 36 + samples.length * 2, true); writeStr(8, "WAVE"); writeStr(12, "fmt ");
    view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, "data"); view.setUint32(40, samples.length * 2, true);
    for (let i = 0; i < samples.length; i++) { const s = Math.max(-1, Math.min(1, samples[i])); view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true); }
    audioCtx.close();
    return new Blob([buffer], { type: "audio/wav" });
}

}

            {listening && !processing && <div className="absolute inset-0 rounded-full bg-red-500/30 pulse-ring"></div>}
            <svg className="w-7 h-7 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                {processing ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    : listening ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
                    : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>}
            </svg>
        </button>
    );
}

function WaveIndicator({ listening }) {
    if (!listening) return null;
    return (<div className="flex items-end gap-1 h-8">{[0,1,2,3,4,5,6].map(i => (<div key={i} className="w-1 bg-indigo-400 rounded-full mic-wave" style={{ animationDelay: `${i*0.12}s`, height: '12px' }}></div>))}</div>);
}

function TopicBadge({ topic, difficulty }) {
    const colors = { Introduction: "bg-blue-500/20 text-blue-300", Python: "bg-yellow-500/20 text-yellow-300", Pytest: "bg-green-500/20 text-green-300", Playwright: "bg-purple-500/20 text-purple-300", Java: "bg-orange-500/20 text-orange-300", Selenium: "bg-emerald-500/20 text-emerald-300", "API Testing": "bg-cyan-500/20 text-cyan-300", "UI Testing": "bg-pink-500/20 text-pink-300", Locust: "bg-lime-500/20 text-lime-300", "Manual Testing": "bg-amber-500/20 text-amber-300", Behavioral: "bg-violet-500/20 text-violet-300", HR: "bg-rose-500/20 text-rose-300" };
    const diffColors = { Easy: "text-green-400", Medium: "text-yellow-400", Hard: "text-red-400" };
    return (<div className="flex items-center gap-2"><span className={`px-3 py-1 rounded-full text-xs font-semibold ${colors[topic] || 'bg-slate-500/20 text-slate-300'}`}>{topic}</span>{difficulty && <span className={`text-xs font-medium ${diffColors[difficulty] || ''}`}>{difficulty}</span>}</div>);
}

// ─── Sprint 1: Auth Screens ───

function LoginScreen({ onLogin, onSwitchToRegister }) {
    const [email, setEmail] = useState("");
    const [password, setPassword] = useState("");
    const [error, setError] = useState("");
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setError(""); setLoading(true);
        try {
            const res = await fetch(`${API}/auth/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
            const data = await res.json();
            if (!res.ok) { setError(data.error || "Login failed"); setLoading(false); return; }
            onLogin(data);
        } catch { setError("Cannot connect to server"); }
        setLoading(false);
    };

    return (
        <div className="min-h-screen flex items-center justify-center p-4 fade-in">
            <div className="glass-strong rounded-2xl p-10 max-w-md w-full glow">
                <div className="text-center mb-8">
                    <div className="w-16 h-16 rounded-2xl bg-indigo-500/20 mx-auto mb-4 flex items-center justify-center">
                        <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    </div>
                    <h1 className="text-3xl font-bold mb-1">GrowthPath</h1>
                    <p className="text-slate-400 text-sm">Sign in to continue learning</p>
                </div>
                {error && <div className="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-xl text-sm mb-4">{error}</div>}

                        <label className="block text-slate-400 text-xs font-medium mb-1.5 uppercase tracking-wider">Email</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" required
                            className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 transition-all"/>
                    </div>
                    <div>
                        <label className="block text-slate-400 text-xs font-medium mb-1.5 uppercase tracking-wider">Password</label>
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter your password" required
                            className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 transition-all"/>
                    </div>
                    <button type="submit" disabled={loading}
                        className="w-full py-3.5 rounded-xl font-semibold text-sm bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 transition-all disabled:opacity-50">
                        {loading ? "Signing in..." : "Sign In"}
                    </button>
                </form>
                <p className="text-center text-slate-500 text-sm mt-6">
                    Don't have an account? <button onClick={onSwitchToRegister} className="text-indigo-400 hover:text-indigo-300 font-medium">Register</button>
                </p>
            </div>
        </div>
    );
}

function RegisterScreen({ onRegister, onSwitchToLogin }) {
    const [name, setName] = useState("");
    const [email, setEmail] = useState("");
    const [techStack, setTechStack] = useState([]);
    const [interests, setInterests] = useState([]);
    const [hours, setHours] = useState(2);
    const [targetCompany, setTargetCompany] = useState("");
    const [targetRole, setTargetRole] = useState("");
    const [targetLevel, setTargetLevel] = useState("");
    const [error, setError] = useState("");
    const [loading, setLoading] = useState(false);
    const [success, setSuccess] = useState(null);
    const [techOptions, setTechOptions] = useState([]);
    const [interestOptions, setInterestOptions] = useState([]);
    const [companyOptions, setCompanyOptions] = useState({companies:[], profiles:{}});
    const [roleOptions, setRoleOptions] = useState({roles:[], labels:{}});
    const [levelOptions, setLevelOptions] = useState({levels:[], labels:{}});

    useEffect(() => {
        fetch(`${API}/config/tech-stacks`).then(r => r.json()).then(setTechOptions).catch(() => {});
        fetch(`${API}/config/interest-areas`).then(r => r.json()).then(setInterestOptions).catch(() => {});
        fetch(`${API}/config/companies`).then(r => r.json()).then(setCompanyOptions).catch(() => {});
        fetch(`${API}/config/roles`).then(r => r.json()).then(setRoleOptions).catch(() => {});
        fetch(`${API}/config/levels`).then(r => r.json()).then(setLevelOptions).catch(() => {});
    }, []);

    const toggleTag = (list, setList, item) => {
        setList(prev => prev.includes(item) ? prev.filter(i => i !== item) : [...prev, item]);
    };

    const selectClass = "w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white text-sm focus:border-indigo-500/50 transition-all appearance-none cursor-pointer";
    const selectActiveClass = (val) => val ? "border-indigo-500/40" : "";

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!targetCompany || !targetRole || !targetLevel) { setError("Select target company, role, and level"); return; }
        if (interests.length === 0) { setError("Select at least one interest area"); return; }
        setError(""); setLoading(true);
        try {
            const res = await fetch(`${API}/auth/register`, { method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ full_name: name, email, tech_stack: techStack, interest_areas: interests, hours_per_day: hours,
                    target_company: targetCompany, target_role: targetRole, target_level: targetLevel }) });
            const data = await res.json();
            if (!res.ok) { setError(data.error || "Registration failed"); setLoading(false); return; }
            setSuccess(data);
        } catch { setError("Cannot connect to server"); }
        setLoading(false);
    };

    if (success) {
        const elo = success.elo;
        return (
            <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                <div className="glass-strong rounded-2xl p-10 max-w-md w-full glow-green text-center">

                        <svg className="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                    </div>
                    <h2 className="text-2xl font-bold mb-2">Registration Successful!</h2>
                    {elo && (
                        <div className="bg-slate-800/60 rounded-xl p-4 mb-4 text-left">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-slate-400 text-xs uppercase">Starting ELO</span>
                                <span className="text-2xl font-bold text-indigo-400">{elo.current_elo}</span>
                            </div>
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-slate-400 text-xs uppercase">{success.target_company} {success.target_level} Bar</span>
                                <span className="text-sm font-medium text-slate-300">{elo.hiring_bar}</span>
                            </div>
                            <div className="flex items-center justify-between">
                                <span className="text-slate-400 text-xs uppercase">Gap to close</span>

                            <div className="w-full bg-slate-700/50 rounded-full h-2 mt-3">

                            </div>
                            <p className="text-xs mt-2 text-center"><span className={`px-2 py-0.5 rounded-full ${elo.is_ready ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>{elo.readiness.label}</span></p>
                        </div>
                    )}
                    <p className="text-slate-400 text-sm mb-2">Your default password is:</p>
                    <div className="bg-slate-800/60 rounded-xl px-6 py-3 mb-4 inline-block">

function QuickAssessmentScreen({ onComplete, onSkip }) {
    const [loading, setLoading] = useState(true);
    const [questions, setQuestions] = useState([]);
    const [sessionId, setSessionId] = useState(null);
    const [currentIdx, setCurrentIdx] = useState(0);
    const [answers, setAnswers] = useState({});
    const [submitting, setSubmitting] = useState(false);
    const [results, setResults] = useState(null);
    const [error, setError] = useState("");
    const [assessmentMeta, setAssessmentMeta] = useState({});

    useEffect(() => {
        apiFetch("/quick-assessment/start", { method: "POST" })
            .then(r => r.json())
            .then(data => {
                if (data.error) { setError(data.error); setLoading(false); return; }
                setSessionId(data.session_id);
                setQuestions(data.questions);
                setAssessmentMeta({ company: data.company, role: data.role, level: data.level });
                setLoading(false);
            })
            .catch(() => { setError("Cannot connect to server"); setLoading(false); });
    }, []);

    const currentQ = questions[currentIdx];
    const progress = questions.length > 0 ? Math.round(((currentIdx) / questions.length) * 100) : 0;

    const handleAnswer = (text) => {
        setAnswers(prev => ({ ...prev, [currentQ.id]: text }));
    };

    const handleNext = () => {
        if (currentIdx < questions.length - 1) {
            setCurrentIdx(currentIdx + 1);
        }
    };

    const handlePrev = () => {
        if (currentIdx > 0) setCurrentIdx(currentIdx - 1);
    };

    const handleSubmit = async () => {
        setSubmitting(true);
        const answerList = questions.map(q => ({
            question_id: q.id,
            answer_text: answers[q.id] || "",
        }));
        try {
            const res = await apiFetch("/quick-assessment/submit", {
                method: "POST",
                body: JSON.stringify({ session_id: sessionId, answers: answerList }),
            });
            const data = await res.json();
            if (data.error) { setError(data.error); setSubmitting(false); return; }
            setResults(data);
        } catch { setError("Failed to submit assessment"); }
        setSubmitting(false);
    };

    if (loading) return <LoadingSpinner />;
    if (error && !questions.length) return (
        <div className="min-h-screen flex items-center justify-center p-4">
            <div className="glass-strong rounded-2xl p-8 max-w-md text-center">
                <p className="text-red-400 mb-4">{error}</p>
                <button onClick={onSkip} className="px-6 py-2 rounded-xl text-sm bg-slate-700 hover:bg-slate-600 text-white">Skip to Dashboard</button>
            </div>
        </div>
    );

    // Results screen
    if (results) {
        const elo = results.elo;
        const readiness = results.readiness;
        const scorecard = results.scorecard;
        return (
            <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                <div className="glass-strong rounded-2xl p-8 max-w-2xl w-full glow">
                    <div className="text-center mb-6">
                        <h2 className="text-2xl font-bold mb-2">Quick Assessment Complete</h2>
                        <p className="text-slate-400 text-sm">Here's your starting position</p>
                    </div>

                    {/* ELO Result */}
                    <div className="glass rounded-xl p-6 mb-6 text-center">
                        <p className="text-slate-500 text-xs uppercase tracking-wider mb-1">Your ELO Rating</p>
                        <p className="text-5xl font-black text-indigo-400 mb-1">{elo.after}</p>
                        <p className="text-sm mb-2">
                            <span className={`px-3 py-1 rounded-full ${readiness.is_ready ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>
                                {readiness.readiness?.label || "Getting There"}
                            </span>
                        </p>
                        <div className="w-full bg-slate-800/50 rounded-full h-3 mt-3 mb-2">
                            <div className="h-3 rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all"
                                style={{width: `${Math.min(100, (elo.after / (readiness.hiring_bar || 1800)) * 100)}%`}}></div>
                        </div>
                        <div className="flex justify-between text-xs text-slate-500">
                            <span>You: {elo.after}</span>
                            <span>{assessmentMeta.company?.charAt(0).toUpperCase() + assessmentMeta.company?.slice(1)} Bar: {readiness.hiring_bar}</span>
                        </div>
                        {readiness.gap > 0 && <p className="text-amber-400 text-sm mt-2 font-medium">{readiness.gap} points to interview ready</p>}
                    </div>

                    {/* Round Scores */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <h3 className="text-white text-sm font-semibold mb-3 uppercase tracking-wider">Score by Round</h3>
                        <div className="space-y-2">
                            {Object.entries(scorecard?.per_round || {}).map(([round, score]) => (
                                <div key={round} className="flex items-center gap-3">
                                    <span className="text-slate-400 text-xs w-28 capitalize">{round.replace(/_/g, " ")}</span>
                                    <div className="flex-1 bg-slate-800/50 rounded-full h-2">
                                        <div className={`h-2 rounded-full transition-all ${score >= 70 ? 'bg-emerald-500' : score >= 40 ? 'bg-amber-500' : 'bg-red-500'}`}
                                            style={{width: `${score}%`}}></div>
                                    </div>
                                    <span className="text-slate-300 text-xs w-8 text-right">{score}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Focus Areas */}
                    {scorecard?.recommended_focus?.length > 0 && (
                        <div className="glass rounded-xl p-4 mb-6">
                            <h3 className="text-red-400 text-sm font-semibold mb-2 uppercase tracking-wider">Focus Areas</h3>
                            <div className="flex flex-wrap gap-2">
                                {scorecard.recommended_focus.map(f => (
                                    <span key={f} className="px-3 py-1 rounded-full bg-red-500/20 text-red-300 text-xs">{f}</span>
                                ))}
                            </div>
                        </div>
                    )}

                    <button onClick={() => onComplete(results)}
                        className="w-full py-3 rounded-xl font-semibold text-sm bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 transition-all">
                        Go to Dashboard
                    </button>
                </div>
            </div>
        );
    }

    // Question screen
    return (
        <div className="min-h-screen flex items-center justify-center p-4 fade-in">
            <div className="glass-strong rounded-2xl p-8 max-w-2xl w-full glow">
                <div className="flex items-center justify-between mb-4">
                    <div>
                        <h2 className="text-lg font-bold">Quick Assessment</h2>
                        <p className="text-slate-500 text-xs capitalize">{assessmentMeta.company} | {(assessmentMeta.role||"").replace(/_/g," ")} | {assessmentMeta.level}</p>
                    </div>
                    <span className="text-slate-400 text-sm">{currentIdx + 1} / {questions.length}</span>
                </div>

                {/* Progress bar */}
                <div className="w-full bg-slate-800/50 rounded-full h-1.5 mb-6">
                    <div className="h-1.5 rounded-full bg-indigo-500 transition-all" style={{width: `${progress}%`}}></div>
                </div>

                {currentQ && (
                    <div>
                        {/* Question metadata */}
                        <div className="flex gap-2 mb-3">
                            <span className="px-2 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300 text-[10px] uppercase">{currentQ.round_type?.replace(/_/g, " ")}</span>
                            <span className="px-2 py-0.5 rounded-full bg-slate-500/20 text-slate-400 text-[10px]">{currentQ.pattern}</span>
                            <span className={`px-2 py-0.5 rounded-full text-[10px] ${currentQ.difficulty === 'hard' ? 'bg-red-500/20 text-red-300' : currentQ.difficulty === 'easy' ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>{currentQ.difficulty}</span>
                            <span className="px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-300 text-[10px]">{currentQ.answer_mode}</span>
                        </div>

                        {/* Question */}
                        <p className="text-white text-base mb-4 leading-relaxed">{currentQ.question}</p>

                        {/* Answer input */}
                        <textarea
                            value={answers[currentQ.id] || ""}
                            onChange={e => handleAnswer(e.target.value)}
                            placeholder="Type your answer here... Be thorough — explain your thinking process, consider trade-offs, and structure your response."
                            rows={8}
                            className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white text-sm placeholder-slate-600 focus:border-indigo-500/50 transition-all resize-none"
                        />
                        <p className="text-slate-600 text-[10px] mt-1 text-right">{(answers[currentQ.id] || "").split(/\s+/).filter(Boolean).length} words</p>

                        {/* Navigation */}
                        <div className="flex items-center justify-between mt-4">
                            <button onClick={handlePrev} disabled={currentIdx === 0}
                                className="px-4 py-2 rounded-xl text-sm text-slate-400 hover:text-white disabled:opacity-30 transition-all">
                                Previous
                            </button>
                            <div className="flex gap-2">
                                {currentIdx < questions.length - 1 ? (
                                    <button onClick={handleNext}
                                        className="px-6 py-2 rounded-xl text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                                        Next
                                    </button>
                                ) : (
                                    <button onClick={handleSubmit} disabled={submitting}
                                        className="px-6 py-2 rounded-xl text-sm font-medium bg-emerald-600 hover:bg-emerald-500 text-white transition-all disabled:opacity-50">
                                        {submitting ? "Evaluating..." : "Submit Assessment"}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {error && <p className="text-red-400 text-sm mt-3">{error}</p>}
            </div>
        </div>
    );
}

function ChangePasswordScreen({ onComplete }) {
    const [password, setPassword] = useState("");
    const [confirm, setConfirm] = useState("");
    const [error, setError] = useState("");
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (password !== confirm) { setError("Passwords don't match"); return; }
        if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
        setError(""); setLoading(true);
        try {
            const res = await apiFetch("/auth/password", { method: "PUT", body: JSON.stringify({ new_password: password }) });
            const data = await res.json();
            if (!res.ok) { setError(data.error || "Failed"); setLoading(false); return; }
            onComplete();
        } catch { setError("Connection error"); }
        setLoading(false);
    };

    return (
        <div className="min-h-screen flex items-center justify-center p-4 fade-in">
            <div className="glass-strong rounded-2xl p-10 max-w-md w-full glow">
                <div className="text-center mb-6">
                    <div className="w-14 h-14 rounded-2xl bg-amber-500/20 mx-auto mb-4 flex items-center justify-center">
                        <svg className="w-7 h-7 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>

function LearningScreen({ initialTopicId, onNavigate }) {
    const [plan, setPlan] = useState(null);
    const [selectedTopic, setSelectedTopic] = useState(null);
    const [topicContent, setTopicContent] = useState(null);
    const [activeDim, setActiveDim] = useState("interview");
    const [dimContent, setDimContent] = useState(null);
    const [loading, setLoading] = useState(true);
    const [loadingContent, setLoadingContent] = useState(false);
    const contentRef = useRef(null);

    useEffect(() => {
        apiFetch("/learning/plan").then(r => r.ok ? r.json() : null).then(p => {
            setPlan(p); setLoading(false);
            if (initialTopicId && p) {
                const topic = p.topics.find(t => t.topic_id === initialTopicId);
                if (topic) loadTopic(topic);
            }
        }).catch(() => setLoading(false));
    }, []);

    const loadTopic = async (topic) => {
        setSelectedTopic(topic);
        setTopicContent(null); setDimContent(null);
        try {
            const res = await apiFetch(`/learning/topic/${topic.topic_id}/content`);
            if (res.ok) {
                const data = await res.json();
                setTopicContent(data);
                loadDimension(topic.topic_id, "interview");
            } else {
                setTopicContent({ dimensions: {}, title: topic.title, noContent: true });
            }
        } catch { setTopicContent({ dimensions: {}, title: topic.title, noContent: true }); }
    };

    const loadDimension = async (topicId, dim) => {
        setActiveDim(dim); setDimContent(null); setLoadingContent(true);
        try {
            const res = await apiFetch(`/learning/topic/${topicId}/content?dimension=${dim}`);
            if (res.ok) {
                const data = await res.json();
                setDimContent(data);
                // Restore bookmark position
                if (data.bookmark && contentRef.current) {
                    setTimeout(() => {
                        if (contentRef.current) contentRef.current.scrollTop = (data.bookmark.scroll_pct / 100) * contentRef.current.scrollHeight;
                    }, 100);
                }
            }
        } catch {}
        setLoadingContent(false);
    };

    const handleSaveBookmark = async () => {
        if (!selectedTopic || !contentRef.current) return;
        const scrollPct = (contentRef.current.scrollTop / contentRef.current.scrollHeight) * 100;
        await apiFetch(`/learning/topic/${selectedTopic.topic_id}/bookmark`, {
            method: "POST", body: JSON.stringify({ dimension: activeDim, position: contentRef.current.scrollTop, scroll_pct: scrollPct })
        });
    };

    const handleCompleteDimension = async () => {
        if (!selectedTopic) return;
        await apiFetch(`/learning/topic/${selectedTopic.topic_id}/dimension/${activeDim}/complete`, { method: "POST" });
        // Reload plan
        const res = await apiFetch("/learning/plan");
        if (res.ok) {
            const p = await res.json();
            setPlan(p);
            const updated = p.topics.find(t => t.topic_id === selectedTopic.topic_id);
            if (updated) setSelectedTopic(updated);
        }
        // Reload topic content to get updated statuses
        loadTopic(selectedTopic);
    };

    const handleMarkReview = async () => {
        if (!selectedTopic) return;
        await apiFetch(`/learning/topic/${selectedTopic.topic_id}/review`, {
            method: "POST", body: JSON.stringify({ dimension: activeDim })
        });
    };

    if (loading) return <LoadingSpinner />;
    if (!plan) return (
        <div className="max-w-2xl mx-auto p-6 text-center fade-in">
            <div className="glass rounded-xl p-8">
                <p className="text-slate-400 mb-4">No learning plan found. Go to Profile to set up your interests and generate a plan.</p>
                <button onClick={() => onNavigate("profile")} className="px-5 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white">Go to Profile</button>
            </div>
        </div>
    );

    // Topic list view
    if (!selectedTopic) {
        return (
            <div className="max-w-4xl mx-auto p-4 md:p-6 fade-in">
                <h1 className="text-2xl font-bold mb-2">Learning Path</h1>
                <p className="text-slate-500 text-sm mb-6">
                    {plan.topics.filter(t => t.status === 'completed').length}/{plan.topics.length} topics completed |
                    Target: {plan.expected_completion}
                </p>
                <div className="space-y-2">
                    {plan.topics.map((topic, i) => {
                        const dimsDone = topic.dimensions_completed ? topic.dimensions_completed.length : 0;
                        const statusColors = {
                            completed: "border-emerald-500/30 bg-emerald-500/5",
                            content_complete: "border-blue-500/30 bg-blue-500/5",
                            in_progress: "border-amber-500/30 bg-amber-500/5",
                            not_started: "border-slate-700/30",
                        };
                        return (
                            <div key={topic.topic_id} onClick={() => loadTopic(topic)}
                                className={`glass rounded-xl p-4 cursor-pointer hover:bg-white/[0.02] transition-all border ${statusColors[topic.status] || ''}`}>
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <span className="text-slate-600 text-xs w-5">{i+1}</span>
                                        <div className={`w-3 h-3 rounded-full ${topic.status === 'completed' ? 'bg-emerald-400' : topic.status === 'in_progress' ? 'bg-amber-400' : topic.status === 'content_complete' ? 'bg-blue-400' : 'bg-slate-700'}`}></div>
                                        <div>
                                            <p className="text-white text-sm font-medium">{topic.title}</p>
                                            <p className="text-slate-500 text-xs">{topic.interest_area} | {topic.estimated_hours}h est.</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-slate-600 text-xs">{dimsDone}/4 dims</span>
                                        {topic.assessment_rating && <Stars rating={topic.assessment_rating} />}
                                        <span className="text-slate-600 text-xs">{topic.revised_end_date}</span>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    // Topic detail view with content
    const dimensions = ["interview", "deep_dive", "best_practices", "tips_tricks"];
    const dimLabels = { interview: "Interview Prep", deep_dive: "Deep Dive", best_practices: "Best Practices", tips_tricks: "Tips & Tricks" };
    const allDimsComplete = selectedTopic.dimensions_completed && selectedTopic.dimensions_completed.length >= 4;

    return (
        <div className="max-w-4xl mx-auto p-4 md:p-6 fade-in">
            {/* Back + Title */}
            <div className="flex items-center gap-3 mb-4">
                <button onClick={() => { setSelectedTopic(null); setTopicContent(null); setDimContent(null); }}
                    className="px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all">
                    Back
                </button>
                <div>
                    <h1 className="text-xl font-bold">{selectedTopic.title}</h1>
                    <p className="text-slate-500 text-xs">{selectedTopic.interest_area} | {selectedTopic.estimated_hours}h estimated</p>
                </div>
            </div>

            {/* Dimension Tabs */}
            <div className="flex gap-2 mb-4 overflow-x-auto">
                {dimensions.map(dim => {
                    const isComplete = selectedTopic.dimensions_completed && selectedTopic.dimensions_completed.includes(dim);
                    const dimMeta = topicContent?.dimensions?.[dim];
                    return (
                        <button key={dim} onClick={() => loadDimension(selectedTopic.topic_id, dim)}
                            className={`px-4 py-2 rounded-xl text-xs font-medium whitespace-nowrap transition-all flex items-center gap-1.5 ${activeDim === dim ? 'bg-indigo-600/30 border border-indigo-500/40 text-indigo-300' : 'glass text-slate-400 hover:text-slate-300'}`}>
                            {isComplete && <svg className="w-3 h-3 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>}
                            {dimLabels[dim]}
                        </button>
                    );
                })}
            </div>

            {/* Content Area */}
            {topicContent?.noContent ? (
                <div className="glass rounded-xl p-8 text-center">
                    <p className="text-slate-500">Content coming soon for this topic.</p>
                    <p className="text-slate-600 text-xs mt-2">{selectedTopic.description}</p>
                </div>
            ) : loadingContent ? <LoadingSpinner /> : dimContent ? (
                <div className="glass rounded-xl overflow-hidden">
                    <div ref={contentRef} className="p-6 max-h-[60vh] overflow-y-auto md-content"
                        onScroll={handleSaveBookmark}
                        dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' && marked.parse ? marked.parse(dimContent.content || '') : (dimContent.content || '') }}>
                    </div>
                    <div className="border-t border-slate-700/30 px-6 py-3 flex items-center justify-between">
                        <div className="flex gap-2">
                            <button onClick={handleCompleteDimension}
                                className="px-4 py-2 rounded-xl text-xs font-medium bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 border border-emerald-500/20 transition-all">
                                Mark Complete
                            </button>
                            <button onClick={handleMarkReview}
                                className="px-4 py-2 rounded-xl text-xs font-medium bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 border border-amber-500/20 transition-all">
                                Mark for Review
                            </button>
                        </div>
                        {/* Navigate dimensions */}
                        <div className="flex gap-2">
                            {activeDim !== "interview" && (
                                <button onClick={() => loadDimension(selectedTopic.topic_id, dimensions[dimensions.indexOf(activeDim) - 1])}
                                    className="px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white transition-all">Prev</button>
                            )}
                            {activeDim !== "tips_tricks" && (
                                <button onClick={() => loadDimension(selectedTopic.topic_id, dimensions[dimensions.indexOf(activeDim) + 1])}
                                    className="px-3 py-1.5 rounded-lg text-xs text-indigo-400 hover:text-indigo-300 transition-all">Next</button>
                            )}
                        </div>
                    </div>
                </div>
            ) : null}

            {/* Assessment trigger */}
            {allDimsComplete && selectedTopic.status !== "completed" && (
                <div className="mt-4 glass rounded-xl p-5 border border-indigo-500/20 text-center fade-in">
                    <p className="text-indigo-300 text-sm font-medium mb-2">All 4 dimensions complete!</p>
                    <p className="text-slate-500 text-xs mb-3">Take the 5-question assessment to earn your topic rating.</p>
                    <button onClick={() => onNavigate("assessment", { topicId: selectedTopic.topic_id, topicTitle: selectedTopic.title })}
                        className="px-6 py-2.5 rounded-xl text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                        Start Assessment
                    </button>
                </div>
            )}
        </div>
    );
}

// ─── Sprint 5: Topic Assessment ───

function TopicAssessmentScreen({ topicId, topicTitle, onComplete, onNavigate }) {
    const [questions, setQuestions] = useState([]);
    const [currentIdx, setCurrentIdx] = useState(0);
    const [answer, setAnswer] = useState("");
    const [result, setResult] = useState(null);
    const [showAnswer, setShowAnswer] = useState(false);
    const [modelAnswer, setModelAnswer] = useState("");
    const [submitting, setSubmitting] = useState(false);
    const [loading, setLoading] = useState(true);
    const [quotaError, setQuotaError] = useState(false);
    const [completed, setCompleted] = useState(false);
    const [finalResult, setFinalResult] = useState(null);

    useEffect(() => {
        apiFetch(`/assessment/topic/${topicId}/questions`).then(r => {
            if (r.status === 429) { setQuotaError(true); setLoading(false); return r.json(); }
            return r.json();
        }).then(data => {
            if (data.questions) setQuestions(data.questions);
            setLoading(false);
        }).catch(() => setLoading(false));
    }, [topicId]);

    const handleShowAnswer = async () => {
        const res = await apiFetch(`/assessment/topic/${topicId}/show-answer`, {
            method: "POST", body: JSON.stringify({ question_id: questions[currentIdx].id })
        });
        const data = await res.json();
        setModelAnswer(data.model_answer);
        setShowAnswer(true);
    };

    const handleSubmit = async () => {
        if (submitting) return;
        setSubmitting(true);
        try {
            const res = await apiFetch(`/assessment/topic/${topicId}/submit`, {
                method: "POST", body: JSON.stringify({ question_id: questions[currentIdx].id, answer, show_answer_used: showAnswer })
            });
            if (res.status === 429) { setQuotaError(true); setSubmitting(false); return; }
            const data = await res.json();
            setResult(data);
        } catch {}
        setSubmitting(false);
    };

    const handleNext = () => {
        setAnswer(""); setResult(null); setShowAnswer(false); setModelAnswer("");
        if (currentIdx < questions.length - 1) {
            setCurrentIdx(currentIdx + 1);
        } else {
            // Complete assessment
            apiFetch(`/assessment/topic/${topicId}/complete`, { method: "POST" }).then(r => r.json()).then(data => {
                setFinalResult(data); setCompleted(true);
            });
        }
    };

    if (loading) return <LoadingSpinner />;

    if (quotaError) {
        return (
            <div className="max-w-lg mx-auto p-6 text-center fade-in">
                <div className="glass rounded-xl p-8">
                    <div className="w-16 h-16 rounded-full bg-amber-500/20 mx-auto mb-4 flex items-center justify-center">
                        <svg className="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <h2 className="text-xl font-bold mb-2">Daily Limit Reached</h2>
                    <p className="text-slate-400 text-sm mb-4">You've used all your questions for today. Come back tomorrow!</p>
                    <button onClick={() => onNavigate("dashboard")} className="px-5 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white">Back to Dashboard</button>
                </div>
            </div>
        );
    }

    if (completed && finalResult) {
        return (
            <div className="max-w-lg mx-auto p-6 text-center fade-in">
                <div className="glass-strong rounded-2xl p-8 glow-green">
                    <div className="w-16 h-16 rounded-full bg-emerald-500/20 mx-auto mb-4 flex items-center justify-center">
                        <svg className="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <h2 className="text-2xl font-bold mb-2">Assessment Complete!</h2>
                    <p className="text-slate-400 text-sm mb-4">{topicTitle}</p>
                    <div className="flex justify-center mb-4"><Stars rating={finalResult.final_rating} size="lg" /></div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        <div className="glass rounded-lg p-3"><p className="text-slate-500 text-xs">Avg Score</p><p className="text-2xl font-bold text-indigo-400">{finalResult.average_score}</p></div>
                        <div className="glass rounded-lg p-3"><p className="text-slate-500 text-xs">Questions</p><p className="text-2xl font-bold text-emerald-400">{finalResult.questions_answered}</p></div>
                    </div>
                    <div className="flex gap-3 justify-center">
                        <button onClick={() => onNavigate("learning")} className="px-5 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white">Continue Learning</button>
                        <button onClick={() => onNavigate("dashboard")} className="px-5 py-2 rounded-xl text-sm text-slate-400 hover:text-white">Dashboard</button>
                    </div>
                </div>
            </div>
        );
    }

    const q = questions[currentIdx];
    if (!q) return <div className="text-center py-12 text-slate-500">No questions available</div>;

    return (
        <div className="max-w-3xl mx-auto p-4 md:p-6 fade-in">
            {/* Header */}
            <div className="flex items-center justify-between mb-4">
                <div>
                    <h1 className="text-lg font-bold">{topicTitle} Assessment</h1>
                    <p className="text-slate-500 text-xs">Question {currentIdx + 1} of {questions.length}</p>
                </div>
                <button onClick={() => onNavigate("learning")} className="text-slate-500 hover:text-slate-300 text-xs">Exit</button>
            </div>

            {/* Progress */}
            <div className="w-full bg-slate-800/50 rounded-full h-1.5 mb-6">
                <div className="bg-indigo-500 h-1.5 rounded-full transition-all" style={{ width: `${((currentIdx + 1) / questions.length) * 100}%` }}></div>
            </div>

            {/* Question */}
            <div className="glass-strong rounded-2xl p-6 mb-4 glow">
                <p className="text-slate-200 text-base leading-relaxed">{q.question}</p>
            </div>

            {!result ? (
                <>
                    {/* Answer input */}
                    <div className="glass rounded-2xl p-1 mb-4">
                        <textarea value={answer} onChange={e => setAnswer(e.target.value)} placeholder="Type your answer here..."
                            className="w-full min-h-[120px] bg-transparent rounded-xl px-5 py-4 text-white placeholder-slate-600 resize-none text-sm leading-relaxed"/>
                    </div>

                    {/* Show Answer */}
                    {showAnswer && (
                        <div className="glass rounded-xl p-4 mb-4 border border-amber-500/20 fade-in">
                            <p className="text-amber-400 text-xs font-semibold mb-1 uppercase tracking-wider">Model Answer (50% penalty applied)</p>
                            <p className="text-slate-300 text-sm leading-relaxed">{modelAnswer}</p>
                        </div>
                    )}

                    {/* Actions */}
                    <div className="flex items-center justify-between">
                        <button onClick={handleShowAnswer} disabled={showAnswer}
                            className="px-4 py-2 rounded-xl text-xs font-medium bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 border border-amber-500/20 transition-all disabled:opacity-30">
                            {showAnswer ? "Answer Shown (-50%)" : "Show Answer"}
                        </button>
                        <div className="flex items-center gap-2">
                            <span className="text-slate-600 text-xs">{answer.split(/\s+/).filter(Boolean).length} words</span>
                            <button onClick={handleSubmit} disabled={submitting || !answer.trim()}
                                className="px-6 py-2.5 rounded-xl text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all disabled:opacity-30">
                                {submitting ? "Submitting..." : "Submit"}
                            </button>
                        </div>
                    </div>
                </>
            ) : (
                /* Result view */
                <div className="fade-in">
                    <div className="glass rounded-xl p-5 mb-4">
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-white text-sm font-semibold">Your Score</span>
                            <div className="flex items-center gap-2">
                                <span className={`text-2xl font-bold ${result.score.total_score >= 70 ? 'text-emerald-400' : result.score.total_score >= 40 ? 'text-amber-400' : 'text-red-400'}`}>{result.score.total_score}/100</span>
                                <Stars rating={result.rating} />
                            </div>
                        </div>
                        {result.score.penalty_applied && <p className="text-amber-400 text-xs mb-2">Penalty: {result.score.penalty_applied}</p>}
                        <div className="grid grid-cols-3 gap-2 mb-3">
                            <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px]">Keywords</p><p className="text-white text-sm font-bold">{result.score.keyword_score}%</p></div>
                            <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px]">Detail</p><p className="text-white text-sm font-bold">{result.score.detail_score}%</p></div>
                            <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px]">Relevance</p><p className="text-white text-sm font-bold">{result.score.relevance_score}%</p></div>
                        </div>
                        <p className="text-slate-400 text-xs">{result.score.feedback}</p>
                    </div>

                    {/* Correct answer */}
                    <div className="glass rounded-xl p-4 mb-4 border border-emerald-500/20">
                        <p className="text-emerald-400 text-xs font-semibold mb-1 uppercase tracking-wider">Correct Answer</p>
                        <p className="text-slate-300 text-sm leading-relaxed">{result.correct_answer}</p>
                    </div>

                    <div className="text-right">
                        <button onClick={handleNext}
                            className="px-6 py-2.5 rounded-xl text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                            {currentIdx < questions.length - 1 ? "Next Question" : "Finish Assessment"}
                        </button>
                    </div>
                </div>
            )}
        </div>
    );
}

// ─── Sprint 7: Review Screen ───

function ReviewScreen({ onNavigate }) {
    const [reviews, setReviews] = useState([]);
    const [assessments, setAssessments] = useState([]);
    const [selectedTopicResults, setSelectedTopicResults] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        Promise.all([
            apiFetch("/review/items").then(r => r.json()),
            apiFetch("/learning/plan").then(r => r.ok ? r.json() : { topics: [] }),
        ]).then(([revs, plan]) => {
            setReviews(revs);
            const completed = (plan.topics || []).filter(t => t.status === "completed");
            setAssessments(completed);
            setLoading(false);
        }).catch(() => setLoading(false));
    }, []);

    const viewAssessmentResults = async (topicId) => {
        const res = await apiFetch(`/review/topic/${topicId}/assessment`);
        const data = await res.json();
        setSelectedTopicResults(data);
    };

    if (loading) return <LoadingSpinner />;

    if (selectedTopicResults) {
        return (
            <div className="max-w-3xl mx-auto p-4 md:p-6 fade-in">
                <button onClick={() => setSelectedTopicResults(null)} className="text-slate-400 hover:text-white text-xs mb-4 inline-block">Back to Review</button>
                <h2 className="text-xl font-bold mb-4">Assessment Results</h2>
                <div className="space-y-3">
                    {(selectedTopicResults.results || []).map((r, i) => (
                        <div key={i} className="glass rounded-xl p-4">
                            <p className="text-slate-300 text-sm font-medium mb-2">{r.question_text}</p>
                            <div className="grid grid-cols-2 gap-3 mb-2">
                                <div><p className="text-slate-500 text-xs mb-1">Your Answer</p><p className="text-slate-400 text-sm bg-slate-800/30 rounded-lg p-2">{r.user_answer || "-- skipped --"}</p></div>
                                <div><p className="text-emerald-400 text-xs mb-1">Correct Answer</p><p className="text-slate-300 text-sm bg-emerald-500/5 rounded-lg p-2">{r.correct_answer}</p></div>
                            </div>
                            <div className="flex items-center gap-3">
                                <Stars rating={r.rating} />
                                <span className={`text-sm font-bold ${r.score?.total_score >= 70 ? 'text-emerald-400' : r.score?.total_score >= 40 ? 'text-amber-400' : 'text-red-400'}`}>{r.score?.total_score || 0}/100</span>
                                {r.show_answer_used && <span className="text-amber-400 text-[10px]">Used Show Answer</span>}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    return (
        <div className="max-w-3xl mx-auto p-4 md:p-6 fade-in">
            <h1 className="text-2xl font-bold mb-6">Review & Revisit</h1>

            {/* Marked for review */}
            {reviews.length > 0 && (
                <div className="mb-6">
                    <h3 className="text-white text-sm font-semibold mb-3 uppercase tracking-wider">Marked for Review</h3>
                    <div className="space-y-2">
                        {reviews.map((r, i) => (
                            <div key={i} className="glass rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-white/[0.02]"
                                onClick={() => onNavigate("learning", { topicId: r.topic_id })}>
                                <div>
                                    <p className="text-white text-sm font-medium">{r.topic_title}</p>
                                    <p className="text-slate-500 text-xs">{r.interest_area}{r.dimension ? ` | ${r.dimension}` : ""}</p>
                                </div>
                                <span className="text-indigo-400 text-xs">Revisit</span>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {/* Completed topics */}
            <div>
                <h3 className="text-white text-sm font-semibold mb-3 uppercase tracking-wider">Completed Topics</h3>
                {assessments.length === 0 ? (
                    <div className="glass rounded-xl p-6 text-center"><p className="text-slate-500 text-sm">No completed topics yet</p></div>
                ) : (
                    <div className="space-y-2">
                        {assessments.map(t => (
                            <div key={t.topic_id} className="glass rounded-xl p-4 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <Stars rating={t.assessment_rating} />
                                    <div>
                                        <p className="text-white text-sm font-medium">{t.title}</p>
                                        <p className="text-slate-500 text-xs">{t.interest_area}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => onNavigate("learning", { topicId: t.topic_id })}
                                        className="px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all">Content</button>
                                    <button onClick={() => viewAssessmentResults(t.topic_id)}
                                        className="px-3 py-1.5 rounded-lg text-xs text-indigo-400 hover:text-indigo-300 hover:bg-indigo-600/10 transition-all">Results</button>
                                </div>

function InterviewRoom({ sessionId, questions, engine, onFinish }) {
    const [currentQ, setCurrentQ] = useState(0);
    const [thinking, setThinking] = useState(false);
    const [submitting, setSubmitting] = useState(false);
    const [showAnswer, setShowAnswer] = useState(false);
    const [modelAnswer, setModelAnswer] = useState("");
    const [loadingAnswer, setLoadingAnswer] = useState(false);
    const [audioUrls, setAudioUrls] = useState({});
    const [voiceEnabled, setVoiceEnabled] = useState(true);
    const [isSpeaking, setIsSpeaking] = useState(false);
    const synthRef = useRef(window.speechSynthesis);
    const timer = useTimer();
    const recorder = useAudioRecorder();
    const browserSpeech = useBrowserSpeech();
    const localSpeech = useLocalSpeech(engine);
    const speech = engine === "browser" ? browserSpeech : localSpeech;
    const [editableTranscript, setEditableTranscript] = useState("");
    const prevQRef = useRef(0);

    // Voice-over: speak a question aloud
    const speakQuestion = (text) => {
        if (!voiceEnabled || !window.speechSynthesis) return;
        synthRef.current.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1.0;
        utter.volume = 1.0;
        // Prefer a natural voice
        const voices = synthRef.current.getVoices();
        const preferred = voices.find(v => v.name.includes("Google") || v.name.includes("Microsoft") || v.name.includes("Samantha"));
        if (preferred) utter.voice = preferred;
        utter.onstart = () => setIsSpeaking(true);
        utter.onend = () => setIsSpeaking(false);
        utter.onerror = () => setIsSpeaking(false);
        synthRef.current.speak(utter);
    };

    useEffect(() => { timer.start(); }, []);
    useEffect(() => { setEditableTranscript(speech.transcript); }, [speech.transcript]);
    useEffect(() => {
        if (currentQ !== prevQRef.current) {
            speech.reset(); setEditableTranscript(""); setShowAnswer(false); setModelAnswer(""); prevQRef.current = currentQ;
        }
        // Speak the new question aloud
        if (questions[currentQ]) {
            setTimeout(() => speakQuestion(questions[currentQ].question), 500);
        }
        return () => { synthRef.current.cancel(); };
    }, [currentQ]);

    // Speak first question on mount
    useEffect(() => {
        const timer = setTimeout(() => {
            if (questions[0]) speakQuestion("Welcome to your interview. Let's begin. " + questions[0].question);
        }, 1000);
        return () => { clearTimeout(timer); synthRef.current.cancel(); };
    }, []);

    const question = questions[currentQ];
    const progress = ((currentQ + 1) / questions.length) * 100;

    const audioBlobsRef = useRef({});
    const handleMicStart = () => { speech.startListening(); recorder.startRecording(); };
    const handleMicStop = async () => {
        speech.stopListening();
        const url = await recorder.stopRecording();
        if (url) {
            setAudioUrls(prev => ({ ...prev, [question.id]: url }));
            // Save blob for server upload
            try {
                const resp = await fetch(url);
                const blob = await resp.blob();
                audioBlobsRef.current[question.id] = blob;
            } catch(e) { console.error("Blob save error:", e); }
        }
    };

    // Upload recording to server
    const uploadRecording = async (questionId) => {
        const blob = audioBlobsRef.current[questionId];
        if (!blob) return;
        try {
            const formData = new FormData();
            formData.append("audio", blob, "recording.webm");
            formData.append("session_id", sessionId);
            formData.append("question_id", String(questionId));
            const token = getToken();
            await fetch(`${API}/recording/upload`, {
                method: "POST",
                headers: token ? { "Authorization": `Bearer ${token}` } : {},
                body: formData,
            });
        } catch(e) { console.error("Upload error:", e); }
    };

    const handleShowAnswer = async () => {
        if (showAnswer) { setShowAnswer(false); return; }
        setLoadingAnswer(true);
        try {
            const res = await fetch(`${API}/question/${question.id}/answer?session_id=${sessionId}`);
            const data = await res.json();
            setModelAnswer(data.model_answer); setShowAnswer(true);
        } catch(e) { console.error(e); }
        setLoadingAnswer(false);
    };

    const handleSubmit = async () => {
        if (submitting || thinking) return;
        if (speech.listening) await handleMicStop();
        setSubmitting(true);
        try {
            // Upload recording to server first
            await uploadRecording(question.id);
            // Then submit the answer
            await fetch(`${API}/answer/submit`, { method: "POST", headers: authHeaders(),
                body: JSON.stringify({ session_id: sessionId, question_id: question.id, transcript: editableTranscript }) });
        } catch (e) { console.error(e); }
        setSubmitting(false); setThinking(true);
        setTimeout(() => {
            setThinking(false);
            if (currentQ < questions.length - 1) setCurrentQ(currentQ + 1);
            else { timer.stop(); onFinish(timer.format(), audioUrls); }
        }, 2000);
    };

    const handleSkip = () => {
        if (speech.listening) { speech.stopListening(); recorder.stopRecording(); }
        fetch(`${API}/answer/submit`, { method: "POST", headers: authHeaders(),
            body: JSON.stringify({ session_id: sessionId, question_id: question.id, transcript: "" }) }).catch(() => {});
        setThinking(true);
        setTimeout(() => {
            setThinking(false);
            if (currentQ < questions.length - 1) setCurrentQ(currentQ + 1);
            else { timer.stop(); onFinish(timer.format(), audioUrls); }
        }, 1500);
    };

    const isProcessing = speech.processing || false;
    const isListening = speech.listening;

    return (
        <div className="min-h-screen flex flex-col p-4 md:p-6 fade-in">
            <CameraPreview />
            <div className="glass rounded-xl px-5 py-3 flex items-center justify-between mb-4">
                <div className="flex items-center gap-4">
                    <TopicBadge topic={question.topic} difficulty={question.difficulty} />
                    <span className="text-indigo-400 text-sm font-semibold">Q {currentQ + 1}/{questions.length}</span>
                </div>
                <div className="flex items-center gap-4">
                    <span className="text-slate-500 text-xs px-2 py-1 rounded-lg bg-slate-800/50">{engine}</span>
                    <div className="flex items-center gap-2">
                        <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span className="text-white font-mono text-sm font-medium">{timer.format()}</span>
                    </div>
                </div>
            </div>
            <div className="w-full bg-slate-800/50 rounded-full h-1 mb-6">
                <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-1 rounded-full transition-all duration-700" style={{ width: `${progress}%` }}></div>
            </div>
            <div className="flex-1 max-w-3xl w-full mx-auto flex flex-col">
                <div className="glass-strong rounded-2xl p-6 mb-4 glow fade-in" key={currentQ}>
                    <div className="flex items-start gap-4">
                        <div className="w-11 h-11 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex-shrink-0 flex items-center justify-center">
                            <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                        </div>
                        <div className="flex-1">
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-indigo-400 text-xs font-semibold uppercase tracking-wider">AI Interviewer</p>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => speakQuestion(question.question)} className="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-all" title="Replay question">
                                        <svg className={`w-4 h-4 ${isSpeaking ? 'text-indigo-400 animate-pulse' : 'text-slate-400'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
                                    </button>
                                    <button onClick={() => { setVoiceEnabled(!voiceEnabled); if (voiceEnabled) synthRef.current.cancel(); }}
                                        className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${voiceEnabled ? 'bg-indigo-600/30 text-indigo-400' : 'bg-slate-700 text-slate-500'}`}
                                        title={voiceEnabled ? "Mute voice" : "Unmute voice"}>
                                        {voiceEnabled ? (
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
                                        ) : (
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
                                        )}
                                    </button>
                                </div>
