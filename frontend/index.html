                            <p className="text-slate-600 text-xs">{editableTranscript.split(/\s+/).filter(Boolean).length} words</p>
                            <button onClick={handleShowAnswer} disabled={loadingAnswer}
                                className="px-4 py-2 rounded-xl text-xs font-medium bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 border border-emerald-500/20 transition-all disabled:opacity-50">
                                {loadingAnswer ? "Loading..." : showAnswer ? "Hide Answer" : "Show Answer"}
                            </button>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={handleSkip} disabled={thinking || submitting}
                                className="px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-300 hover:bg-slate-800/50 transition-all disabled:opacity-30">Skip</button>
                            <button onClick={handleSubmit} disabled={thinking || submitting || !editableTranscript.trim() || !audioUrls[question.id]}
                                title={!audioUrls[question.id] ? "Record your answer first" : ""}
                                className="px-8 py-3 rounded-xl font-semibold text-sm transition-all disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20">
                                {submitting ? "Submitting..." : !audioUrls[question.id] ? "Record First" : currentQ === questions.length - 1 ? "Finish" : "Submit"}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

function ResultsPage({ scorecard, questionReview, audioUrls: localAudioUrls, onRestart, sessionId }) {
    const [animScore, setAnimScore] = useState(0);
    const [expandedQ, setExpandedQ] = useState(null);
    const [serverAudioUrls, setServerAudioUrls] = useState({});
    const score = scorecard.overall_score;

    // Merge local blob URLs with server URLs (server URLs persist after refresh)
    const audioUrls = { ...serverAudioUrls, ...localAudioUrls };

    useEffect(() => {
        // Load server-side recordings for this session
        if (sessionId) {
            apiFetch(`/recording/list/${sessionId}`).then(r => r.json()).then(data => {
                setServerAudioUrls(data);
            }).catch(() => {});
        }
    }, [sessionId]);

    useEffect(() => {
        if (score === 0) return;
        let s = 0; const step = Math.max(1500 / score, 10);
        const t = setInterval(() => { s++; setAnimScore(s); if (s >= score) clearInterval(t); }, step);
        return () => clearInterval(t);
    }, [score]);

    const scoreColor = score >= 75 ? "text-emerald-400" : score >= 50 ? "text-amber-400" : "text-red-400";
    const scoreBg = score >= 75 ? "from-emerald-500/20 to-emerald-500/5" : score >= 50 ? "from-amber-500/20 to-amber-500/5" : "from-red-500/20 to-red-500/5";
    const topicEntries = Object.entries(scorecard.topic_scores || {}).sort((a,b) => b[1] - a[1]);

    return (
        <div className="min-h-screen p-4 md:p-8 fade-in">
            <div className="max-w-3xl mx-auto">
                <div className="text-center mb-8">
                    <p className="text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-2">Interview Complete</p>
                    <h1 className="text-3xl font-bold mb-1">Your Scorecard</h1>
                    <p className="text-slate-500 text-sm">{scorecard.candidate_name} | {scorecard.job_title} | {scorecard.time_taken}</p>
                </div>
                <div className={`glass-strong rounded-2xl p-8 text-center mb-6 ${score >= 75 ? 'glow-green' : 'glow'}`}>
                    <div className={`inline-flex items-center justify-center w-36 h-36 rounded-full bg-gradient-to-b ${scoreBg} mb-4`}>
                        <div><span className={`text-5xl font-black ${scoreColor}`}>{animScore}</span><span className="text-slate-500 text-xl font-medium">/100</span></div>
                    </div>
                    <div className="flex justify-center mt-2"><Stars rating={Math.round(score / 20)} size="lg" /></div>
                </div>
                <div className="glass rounded-2xl p-6 mb-6">
                    <h3 className="text-white text-sm font-semibold mb-4 uppercase tracking-wider">Topic Breakdown</h3>
                    <div className="space-y-3">
                        {topicEntries.map(([topic, s]) => (
                            <div key={topic} className="flex items-center gap-3">
                                <span className="text-slate-400 text-xs w-28 truncate">{topic}</span>
                                <div className="flex-1 bg-slate-800/50 rounded-full h-2.5">
                                    <div className={`h-2.5 rounded-full transition-all duration-1000 ${s >= 75 ? 'bg-emerald-500' : s >= 50 ? 'bg-amber-500' : 'bg-red-500'}`} style={{ width: `${s}%` }}></div>
                                </div>
                                <span className="text-slate-400 text-xs font-mono w-10 text-right">{s}/100</span>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="grid md:grid-cols-2 gap-4 mb-6">
                    <div className="glass rounded-2xl p-6">
                        <h3 className="text-emerald-400 text-sm font-semibold mb-3 uppercase tracking-wider">Strengths</h3>
                        <ul className="space-y-2">{(scorecard.strengths || []).map((s,i) => (<li key={i} className="flex items-start gap-2"><span className="text-emerald-500 mt-0.5">&#8226;</span><span className="text-slate-300 text-sm">{s}</span></li>))}</ul>
                    </div>
                    <div className="glass rounded-2xl p-6">
                        <h3 className="text-amber-400 text-sm font-semibold mb-3 uppercase tracking-wider">Improvements</h3>
                        <ul className="space-y-2">{(scorecard.improvements || []).map((s,i) => (<li key={i} className="flex items-start gap-2"><span className="text-amber-500 font-bold mt-0.5">{i+1}.</span><span className="text-slate-300 text-sm">{s}</span></li>))}</ul>
                    </div>
                </div>
                <div className="glass rounded-2xl overflow-hidden mb-6">
                    <div className="px-6 py-4 border-b border-slate-700/30">
                        <h3 className="text-white text-sm font-semibold uppercase tracking-wider">Deep Dive Review</h3>
                        <p className="text-slate-500 text-xs mt-1">Click any question to see full analysis</p>
                    </div>
                    <div className="divide-y divide-slate-700/20 max-h-[700px] overflow-y-auto">
                        {(questionReview || []).map((qr, i) => {
                            const isOpen = expandedQ === i;
                            const sc = qr.score;
                            return (
                                <div key={i}>
                                    <button onClick={() => setExpandedQ(isOpen ? null : i)}
                                        className="w-full px-6 py-3.5 flex items-center justify-between hover:bg-white/[0.02] transition-colors text-left">
                                        <div className="flex items-center gap-3">
                                            <span className="text-indigo-400 text-xs font-bold w-7">Q{i+1}</span>
                                            <span className="text-slate-500 text-xs w-24">{qr.topic}</span>
                                            <span className="text-slate-300 text-sm truncate max-w-[300px]">{qr.question_text.substring(0, 60)}...</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            {audioUrls[qr.question_id] && <span className="text-slate-600 text-[10px]">REC</span>}
                                            <span className={`text-xs font-bold px-2 py-1 rounded-lg ${sc.total_score >= 70 ? 'bg-emerald-500/20 text-emerald-400' : sc.total_score >= 40 ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
                                                {sc.total_score}/100
                                            </span>
                                            <svg className={`w-4 h-4 text-slate-500 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                                        </div>
                                    </button>
                                    {isOpen && (
                                        <div className="px-6 pb-5 fade-in">
                                            <p className="text-slate-300 text-sm mb-3 font-medium">{qr.question_text}</p>
                                            {audioUrls[qr.question_id] && (
                                                <div className="mb-3"><p className="text-slate-500 text-xs mb-1 uppercase tracking-wider">Your Recording</p>
                                                    <audio controls src={audioUrls[qr.question_id]} className="w-full h-8 opacity-70" style={{ filter: "invert(1)" }}></audio></div>
                                            )}
                                            <div className="mb-3"><p className="text-slate-500 text-xs mb-1 uppercase tracking-wider">Your Answer</p>
                                                <p className="text-slate-400 text-sm italic bg-slate-800/30 rounded-xl p-3">{qr.transcript ? `"${qr.transcript}"` : "-- Skipped --"}</p></div>
                                            {qr.model_answer && (
                                                <div className="mb-3"><p className="text-emerald-400 text-xs mb-1 uppercase tracking-wider">Expected Answer</p>
                                                    <p className="text-slate-300 text-sm bg-emerald-500/5 border border-emerald-500/10 rounded-xl p-3">{qr.model_answer}</p></div>
                                            )}
                                            <div className="grid grid-cols-3 gap-2 mb-3">
                                                <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px] uppercase">Keywords</p><p className="text-white text-sm font-bold">{sc.keyword_score}%</p></div>
                                                <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px] uppercase">Detail</p><p className="text-white text-sm font-bold">{sc.detail_score}%</p></div>
                                                <div className="bg-slate-800/30 rounded-lg p-2 text-center"><p className="text-slate-500 text-[10px] uppercase">Relevance</p><p className="text-white text-sm font-bold">{sc.relevance_score}%</p></div>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 mb-2">
                                                {(sc.matched_keywords || []).map((k, j) => (<span key={j} className="px-2 py-0.5 rounded-full text-[10px] bg-emerald-500/20 text-emerald-400">{k}</span>))}
                                                {(sc.missed_keywords || []).map((k, j) => (<span key={j} className="px-2 py-0.5 rounded-full text-[10px] bg-red-500/20 text-red-400 line-through">{k}</span>))}
                                            </div>
                                            <p className="text-slate-400 text-xs">{sc.feedback}</p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
                <div className="text-center pb-8">
                    <button onClick={onRestart} className="px-10 py-3.5 rounded-xl font-semibold text-sm bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 transition-all">Back to Dashboard</button>
                </div>
            </div>
        </div>
    );
}

function AIInterviewHub({ onNavigate }) {
    const [resumes, setResumes] = useState([]);
    const [interviews, setInterviews] = useState([]);
    const [loading, setLoading] = useState(true);
    const [uploading, setUploading] = useState(false);
    const [creating, setCreating] = useState(false);
    const [llmStatus, setLlmStatus] = useState(null);
    const [error, setError] = useState(null);
    const [success, setSuccess] = useState(null);
    const fileRef = useRef(null);
    const user = getUser();

    useEffect(() => {
        loadData();
        fetch(`${API}/config/llm-status`).then(r => r.json()).then(setLlmStatus).catch(() => {});
    }, []);

    const loadData = async () => {
        setLoading(true);
        try {
            const [rRes, iRes] = await Promise.all([
                apiFetch("/resume/list"), apiFetch("/ai-interview/list")
            ]);
            setResumes(await rRes.json());
            setInterviews(await iRes.json());
        } catch(e) { setError("Failed to load data"); }
        setLoading(false);
    };

    const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true); setError(null); setSuccess(null);
        const formData = new FormData();
        formData.append("file", file);
        try {
            const res = await fetch(`${API}/resume/upload`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${getToken()}` },
                body: formData,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            setSuccess("Resume uploaded and parsed successfully!");
            loadData();
        } catch(e) { setError(e.message); }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = "";
    };

    const handleCreateInterview = async (resumeId, interestArea) => {
        setCreating(true); setError(null);
        try {
            const res = await apiFetch("/ai-interview/create", {
                method: "POST",
                body: JSON.stringify({ resume_id: resumeId, interest_area: interestArea }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            setSuccess("Interview created! Click 'Start' to begin.");
            loadData();
        } catch(e) { setError(e.message); }
        setCreating(false);
    };

    const statusColors = { pending: "text-yellow-400 bg-yellow-400/10", in_progress: "text-blue-400 bg-blue-400/10", completed: "text-green-400 bg-green-400/10", evaluated: "text-purple-400 bg-purple-400/10" };

    if (loading) return <LoadingSpinner />;

    return (
        <div className="max-w-5xl mx-auto px-4 py-6 fade-in">
            {/* Header */}
            <div className="mb-8">
                <h1 className="text-2xl font-bold text-white mb-2">AI Voice Interview</h1>
                <p className="text-slate-400 text-sm">Upload your resume, get AI-generated questions based on your interest area, and practice with an AI interviewer.</p>
            </div>

            {/* LLM Status Banner */}
            {llmStatus && !llmStatus.any_available && (
                <div className="glass border-amber-500/30 bg-amber-500/10 rounded-xl p-4 mb-6">
                    <p className="text-amber-300 text-sm font-medium">No LLM API keys configured</p>
                    <p className="text-amber-400/70 text-xs mt-1">Set ANTHROPIC_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY environment variable to enable AI features.</p>
                </div>
            )}

            {error && <div className="bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl text-sm mb-4">{error}<button onClick={() => setError(null)} className="ml-3 text-red-400">&times;</button></div>}
            {success && <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 px-4 py-3 rounded-xl text-sm mb-4">{success}<button onClick={() => setSuccess(null)} className="ml-3 text-emerald-400">&times;</button></div>}

            {/* Step 1: Upload Resume */}
            <div className="glass rounded-2xl p-6 mb-6">
                <div className="flex items-center gap-3 mb-4">
                    <div className="w-8 h-8 rounded-full bg-indigo-600/30 flex items-center justify-center text-indigo-300 font-bold text-sm">1</div>
                    <h2 className="text-lg font-semibold text-white">Upload Resume</h2>
                </div>
                <div className="flex items-center gap-4">
                    <label className={`cursor-pointer px-5 py-2.5 rounded-xl font-medium text-sm transition-all ${uploading ? 'bg-slate-700 text-slate-400' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                        {uploading ? (
                            <span className="flex items-center gap-2">
                                <svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                Parsing...
                            </span>
                        ) : (
                            <span className="flex items-center gap-2">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                                {resumes.length > 0 ? "Replace Resume" : "Upload PDF / DOCX"}
                            </span>
                        )}
                        <input ref={fileRef} type="file" accept=".pdf,.docx,.doc,.txt" onChange={handleUpload} className="hidden" disabled={uploading} />
                    </label>
                    <span className="text-slate-500 text-xs">{resumes.length > 0 ? "Uploading a new resume will replace the existing one" : "Supported: PDF, DOCX, TXT (max 5MB)"}</span>
                </div>

                {/* Uploaded Resumes */}
                {resumes.length > 0 && (
                    <div className="mt-4 space-y-2">
                        {resumes.map(r => (
                            <div key={r.id} className="glass-strong rounded-xl p-4">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-white text-sm font-medium">{r.filename}</p>
                                        <p className="text-slate-500 text-xs mt-1">
                                            {r.parsed_data?.skills?.slice(0,5).join(", ") || "No skills detected"}
                                            {r.parsed_data?.skills?.length > 5 && ` +${r.parsed_data.skills.length - 5} more`}
                                        </p>
                                        <p className="text-slate-600 text-xs mt-0.5">
                                            {r.parsed_data?.experience_level || "?"} level | {r.parsed_data?.experience_years || 0} yrs exp
                                        </p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <p className="text-slate-600 text-xs">{new Date(r.uploaded_at).toLocaleDateString()}</p>
                                        <button onClick={async () => {
                                            if (!confirm("Delete this resume?")) return;
                                            try {
                                                await apiFetch(`/resume/${r.id}`, { method: "DELETE" });
                                                loadData();
                                            } catch(e) { setError("Failed to delete"); }
                                        }} className="text-red-400/50 hover:text-red-400 transition-colors" title="Delete resume">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>

            {/* Step 2: Create Interview */}
            {resumes.length > 0 && (
                <div className="glass rounded-2xl p-6 mb-6">
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-8 h-8 rounded-full bg-emerald-600/30 flex items-center justify-center text-emerald-300 font-bold text-sm">2</div>
                        <h2 className="text-lg font-semibold text-white">Start AI Interview</h2>
                    </div>
                    <p className="text-slate-400 text-sm mb-4">Select a resume and your interest area to generate personalized interview questions.</p>

                    <CreateInterviewForm
                        resumes={resumes}
                        userInterests={user?.interest_areas || []}
                        creating={creating}
                        onSubmit={handleCreateInterview}
                    />
                </div>
            )}

            {/* Step 3: Your Interviews */}
            {interviews.length > 0 && (
                <div className="glass rounded-2xl p-6">
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-8 h-8 rounded-full bg-purple-600/30 flex items-center justify-center text-purple-300 font-bold text-sm">3</div>
                        <h2 className="text-lg font-semibold text-white">Your Interviews</h2>
                    </div>
                    <div className="space-y-3">
                        {interviews.map(iv => (
                            <div key={iv.id} className="glass-strong rounded-xl p-4 flex items-center justify-between">
                                <div>
                                    <div className="flex items-center gap-2">
                                        <p className="text-white text-sm font-medium">{iv.interest_area} Interview</p>
                                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${statusColors[iv.status] || 'text-slate-400 bg-slate-400/10'}`}>
                                            {iv.status}
                                        </span>
                                    </div>
                                    <p className="text-slate-500 text-xs mt-1">{iv.total_questions} questions | {iv.job_role}</p>
                                    <p className="text-slate-600 text-xs">{new Date(iv.created_at).toLocaleDateString()}</p>
                                </div>
                                <div className="flex gap-2">
                                    {iv.status === "pending" && (
                                        <button onClick={() => onNavigate("ai_interview_room", { interviewId: iv.id })}
                                            className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-medium transition-all">
                                            Start
                                        </button>
                                    )}
                                    {iv.status === "in_progress" && (
                                        <button onClick={() => onNavigate("ai_interview_room", { interviewId: iv.id })}
                                            className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-xs font-medium transition-all">
                                            Resume
                                        </button>
                                    )}
                                    {iv.status === "completed" && (
                                        <button onClick={() => onNavigate("ai_interview_room", { interviewId: iv.id, evaluate: true })}
                                            className="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg text-xs font-medium transition-all">
                                            Evaluate
                                        </button>
                                    )}
                                    {iv.status === "evaluated" && (
                                        <button onClick={() => onNavigate("ai_results", { interviewId: iv.id })}
                                            className="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-lg text-xs font-medium transition-all">
                                            View Results
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
        </div>
    );
}

function CreateInterviewForm({ resumes, userInterests, creating, onSubmit }) {
    const [selectedResume, setSelectedResume] = useState(resumes[0]?.id || "");
    const [selectedInterest, setSelectedInterest] = useState(userInterests[0] || "");
    const [allInterests, setAllInterests] = useState([]);

    useEffect(() => {
        fetch(`${API}/config/interest-areas`).then(r => r.json()).then(setAllInterests).catch(() => {});
    }, []);

    return (
        <div className="flex flex-wrap items-end gap-4">
            <div className="flex-1 min-w-[200px]">
                <label className="text-slate-400 text-xs mb-1 block">Resume</label>
                <select value={selectedResume} onChange={e => setSelectedResume(e.target.value)}
                    className="w-full bg-slate-800/50 border border-slate-700/50 rounded-lg px-3 py-2 text-white text-sm">
                    {resumes.map(r => <option key={r.id} value={r.id}>{r.filename}</option>)}
                </select>
            </div>
            <div className="flex-1 min-w-[200px]">
                <label className="text-slate-400 text-xs mb-1 block">Interest Area (questions will focus on this)</label>
                <select value={selectedInterest} onChange={e => setSelectedInterest(e.target.value)}
                    className="w-full bg-slate-800/50 border border-slate-700/50 rounded-lg px-3 py-2 text-white text-sm">
                    {(allInterests.length > 0 ? allInterests : userInterests).map(i =>
                        <option key={i} value={i}>{i}</option>
                    )}
                </select>
            </div>
            <button onClick={() => onSubmit(selectedResume, selectedInterest)} disabled={creating || !selectedResume}
                className={`px-6 py-2.5 rounded-xl font-medium text-sm transition-all ${creating ? 'bg-slate-700 text-slate-400' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`}>
                {creating ? (
                    <span className="flex items-center gap-2">
                        <svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        Generating Questions...
                    </span>
                ) : "Create Interview"}
            </button>
        </div>
    );
}

function AIInterviewRoom({ interviewId, evaluateMode, onNavigate }) {
    const [interview, setInterview] = useState(null);
    const [currentQ, setCurrentQ] = useState(0);
    const [totalQ, setTotalQ] = useState(0);
    const [question, setQuestion] = useState("");
    const [category, setCategory] = useState("");
    const [exchangeId, setExchangeId] = useState(null);
    const [answer, setAnswer] = useState("");
    const [aiResponse, setAiResponse] = useState("");
    const [greeting, setGreeting] = useState("");
    const [loading, setLoading] = useState(true);
    const [submitting, setSubmitting] = useState(false);
    const [finished, setFinished] = useState(false);
    const [evaluating, setEvaluating] = useState(false);
    const [listening, setListening] = useState(false);
    const [speaking, setSpeaking] = useState(false);
    const [error, setError] = useState(null);
    const recognitionRef = useRef(null);
    const synthRef = useRef(window.speechSynthesis);

    useEffect(() => {
        loadInterview();
    }, [interviewId]);

    const loadInterview = async () => {
        try {
            const res = await apiFetch(`/ai-interview/${interviewId}`);
            const data = await res.json();
            setInterview(data);
            setTotalQ(data.total_questions);

            if (evaluateMode && data.status === "completed") {
                handleEvaluate();
                return;
            }

            if (data.status === "pending" || data.status === "in_progress") {
                await startInterview();
            } else if (data.status === "evaluated") {
                onNavigate("ai_results", { interviewId });
            } else {
                setFinished(true);
            }
        } catch(e) { setError("Failed to load interview"); }
        setLoading(false);
    };

    const startInterview = async () => {
        try {
            const res = await apiFetch(`/ai-interview/${interviewId}/start`, { method: "POST" });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            setCurrentQ(data.current_question);
            setTotalQ(data.total_questions);
            setQuestion(data.question);
            setCategory(data.category);
            setExchangeId(data.exchange_id);
            setGreeting(data.greeting);
            // Speak the greeting + question
            speak(data.greeting + " " + data.question);
        } catch(e) { setError(e.message); }
        setLoading(false);
    };

    const speak = (text) => {
        if (!synthRef.current) return;
        synthRef.current.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1;
        utter.lang = "en-US";
        const voices = synthRef.current.getVoices();
        const preferred = voices.find(v => v.name.includes("Google") || v.name.includes("Samantha") || v.name.includes("Daniel"));
        if (preferred) utter.voice = preferred;
        setSpeaking(true);
        utter.onend = () => setSpeaking(false);
        synthRef.current.speak(utter);
    };

    const startListening = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            setError("Speech recognition not supported. Please type your answer.");
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-US";

        let finalTranscript = answer;
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    finalTranscript += e.results[i][0].transcript + " ";
                } else {
                    interim += e.results[i][0].transcript;
                }
            }
            setAnswer(finalTranscript + interim);
        };
        recognition.onerror = () => setListening(false);
        recognition.onend = () => setListening(false);
        recognition.start();
        recognitionRef.current = recognition;
        setListening(true);
    };

    const stopListening = () => {
        if (recognitionRef.current) {
            recognitionRef.current.stop();
            recognitionRef.current = null;
        }
        setListening(false);
    };

    const handleSubmitAnswer = async () => {
        if (!answer.trim()) return;
        setSubmitting(true); setError(null);
        stopListening();
        synthRef.current?.cancel();

        try {
            const res = await apiFetch(`/ai-interview/${interviewId}/answer`, {
                method: "POST",
                body: JSON.stringify({ answer: answer.trim(), exchange_id: exchangeId }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            setAiResponse(data.ai_response);

            if (data.status === "completed") {
                speak(data.ai_response);
                setFinished(true);
            } else {
                // Speak AI response then next question
                speak(data.ai_response + " ... " + data.question);
                setCurrentQ(data.current_question);
                setQuestion(data.question);
                setCategory(data.category);
                setExchangeId(data.exchange_id);
                setAnswer("");
            }
        } catch(e) { setError(e.message); }
        setSubmitting(false);
    };

    const handleEvaluate = async () => {
        setEvaluating(true); setError(null);
        try {
            const res = await apiFetch(`/ai-interview/${interviewId}/evaluate`, { method: "POST" });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            onNavigate("ai_results", { interviewId });
        } catch(e) { setError(e.message); setEvaluating(false); }
    };

    const handleEndEarly = async () => {
        try {
            await apiFetch(`/ai-interview/${interviewId}/end`, { method: "POST" });
            setFinished(true);
        } catch(e) { setError(e.message); }
    };

    const categoryColors = { technical: "bg-blue-500/20 text-blue-300", behavioral: "bg-green-500/20 text-green-300", situational: "bg-amber-500/20 text-amber-300", project: "bg-purple-500/20 text-purple-300" };

    if (loading) return <LoadingSpinner />;
    if (evaluating) return (
        <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
                <svg className="animate-spin w-12 h-12 text-indigo-400 mx-auto mb-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <p className="text-white text-lg font-medium">AI is evaluating your answers...</p>
                <p className="text-slate-400 text-sm mt-2">This may take a minute</p>
            </div>
        </div>
    );

    if (finished) return (
        <div className="min-h-screen flex items-center justify-center">
            <div className="glass rounded-2xl p-8 text-center max-w-md">
                <div className="w-16 h-16 rounded-full bg-emerald-600/20 flex items-center justify-center mx-auto mb-4">
                    <svg className="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2 className="text-xl font-bold text-white mb-2">Interview Complete!</h2>
                <p className="text-slate-400 text-sm mb-6">Your answers have been recorded. Get your AI evaluation now.</p>
                <div className="flex gap-3 justify-center">
                    <button onClick={handleEvaluate} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-medium transition-all">
                        Get AI Evaluation
                    </button>
                    <button onClick={() => onNavigate("ai_interview")} className="px-6 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-xl text-sm font-medium transition-all">
                        Back
                    </button>
                </div>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen flex flex-col">
            {/* Top bar */}
            <div className="glass-strong border-b border-slate-800/50 px-6 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3">
                    <div className={`w-3 h-3 rounded-full ${speaking ? 'bg-emerald-400 animate-pulse' : 'bg-slate-600'}`}/>
                    <span className="text-white text-sm font-medium">AI Interviewer: Alex</span>
                    <span className={`px-2 py-0.5 rounded-full text-xs ${categoryColors[category] || 'bg-slate-500/20 text-slate-300'}`}>{category}</span>
                </div>
                <div className="flex items-center gap-4">
                    <span className="text-slate-400 text-sm">Question {currentQ + 1} / {totalQ}</span>
                    <div className="w-32 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div className="h-full bg-indigo-500 rounded-full transition-all" style={{width: `${((currentQ + 1) / totalQ) * 100}%`}}/>
                    </div>
                    <button onClick={handleEndEarly} className="text-red-400 hover:text-red-300 text-xs">End Interview</button>
                </div>
            </div>

            {/* Main area */}
            <div className="flex-1 flex flex-col max-w-3xl mx-auto w-full px-4 py-8">
                {error && <div className="bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-2 rounded-xl text-sm mb-4">{error}</div>}

                {/* AI Response */}
                {(aiResponse || greeting) && (
                    <div className="mb-6 flex gap-3">
                        <div className="w-8 h-8 rounded-full bg-indigo-600/30 flex-shrink-0 flex items-center justify-center">
                            <svg className="w-4 h-4 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3"/></svg>
                        </div>
                        <div className="glass-strong rounded-2xl rounded-tl-sm px-4 py-3 max-w-lg">
                            <p className="text-slate-300 text-sm">{aiResponse || greeting}</p>
                        </div>
                    </div>
                )}

                {/* Current Question */}
                <div className="mb-6 flex gap-3">
                    <div className="w-8 h-8 rounded-full bg-indigo-600/30 flex-shrink-0 flex items-center justify-center">
                        <span className="text-indigo-300 text-xs font-bold">Q</span>
                    </div>
                    <div className="glass rounded-2xl rounded-tl-sm px-5 py-4 max-w-lg glow">
                        <p className="text-white text-sm leading-relaxed">{question}</p>
                    </div>
                </div>

                {/* Answer Area */}
                <div className="mt-auto">
                    <div className="glass rounded-2xl p-4">
                        <textarea
                            value={answer}
                            onChange={e => setAnswer(e.target.value)}
                            placeholder={listening ? "Listening... speak your answer" : "Type your answer or click the mic to speak..."}
                            className="w-full bg-transparent text-white text-sm placeholder-slate-600 resize-none focus:outline-none"
                            rows={4}
                        />
                        <div className="flex items-center justify-between mt-3 pt-3 border-t border-slate-800/50">
                            <div className="flex items-center gap-3">
                                {/* Mic Button */}
                                <button
                                    onClick={listening ? stopListening : startListening}
                                    className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${listening ? 'bg-red-500 hover:bg-red-400 animate-pulse' : 'bg-slate-700 hover:bg-slate-600'}`}>
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                                    </svg>
                                </button>
                                {listening && <span className="text-red-400 text-xs animate-pulse">Recording...</span>}
                                {/* Speaker button to replay question */}
                                <button onClick={() => speak(question)} className="w-10 h-10 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-all" title="Replay question">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
                                    </svg>
                                </button>
                            </div>
                            <button
                                onClick={handleSubmitAnswer}
                                disabled={submitting || !answer.trim()}
                                className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-all flex items-center gap-2 ${submitting || !answer.trim() ? 'bg-slate-700 text-slate-500' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                                {submitting ? (
                                    <><svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Processing...</>
                                ) : (
                                    <>Submit Answer <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg></>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

function AIResultsScreen({ interviewId, onNavigate }) {

    const [loading, setLoading] = useState(true);

    useEffect(() => {
        apiFetch(`/ai-interview/${interviewId}/results`)
            .then(r => r.json())
            .then(d => { setData(d); setLoading(false); })
            .catch(() => setLoading(false));

    if (loading) return <LoadingSpinner />;
    if (!data) return <div className="text-center py-20 text-slate-400">No results found</div>;

    const result = data.result;
    const transcript = data.transcript || [];
    const interview = data.interview || {};

    const recColors = { strong_hire: "text-emerald-400 bg-emerald-400/10", hire: "text-green-400 bg-green-400/10", maybe: "text-amber-400 bg-amber-400/10", no_hire: "text-red-400 bg-red-400/10" };

                            <span className={`px-4 py-2 rounded-xl text-sm font-bold ${recColors[result.recommendation] || 'text-slate-400 bg-slate-400/10'}`}>
                                {recLabels[result.recommendation] || result.recommendation}

                                        <p className="text-white text-lg font-bold">{score}</p>

                            </div>
                        )}

                        {/* Summary */}
                        {result.summary && <p className="text-slate-300 text-sm leading-relaxed">{result.summary}</p>}
                    </div>

                    {/* Strengths & Improvements */}
                    <div className="grid md:grid-cols-2 gap-4 mb-6">
                        <div className="glass rounded-2xl p-5">
                            <h3 className="text-emerald-400 text-sm font-semibold mb-3 flex items-center gap-2">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                                Strengths
                            </h3>
                            <ul className="space-y-2">
                                {(result.top_strengths || []).map((s, i) => (
                                    <li key={i} className="text-slate-300 text-sm flex items-start gap-2">
                                        <span className="text-emerald-500 mt-1">+</span> {s}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="glass rounded-2xl p-5">
                            <h3 className="text-amber-400 text-sm font-semibold mb-3 flex items-center gap-2">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                                Areas to Improve
                            </h3>
                            <ul className="space-y-2">
                                {(result.improvement_areas || []).map((s, i) => (
                                    <li key={i} className="text-slate-300 text-sm flex items-start gap-2">
                                        <span className="text-amber-500 mt-1">!</span> {s}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </>

            {/* Transcript with Evaluations */}
            <div className="glass rounded-2xl p-6">
                <h3 className="text-white text-lg font-semibold mb-4">Interview Transcript</h3>
                <div className="space-y-6">

                        <div key={i} className="glass-strong rounded-xl p-4">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="text-indigo-400 text-xs font-bold">Q{ex.sequence + 1}</span>
                                <span className={`px-2 py-0.5 rounded-full text-xs ${ex.category === 'technical' ? 'bg-blue-500/20 text-blue-300' : ex.category === 'behavioral' ? 'bg-green-500/20 text-green-300' : ex.category === 'situational' ? 'bg-amber-500/20 text-amber-300' : 'bg-purple-500/20 text-purple-300'}`}>
                                    {ex.category}
                                </span>
                            </div>
                            <p className="text-white text-sm font-medium mb-2">{ex.question}</p>
                            <p className="text-slate-400 text-sm mb-3">{ex.answer || <span className="italic text-slate-600">No answer</span>}</p>

                            {ex.evaluation && (
                                <div className="border-t border-slate-700/50 pt-3 mt-3">
                                    <div className="flex gap-3 mb-2">
                                        {["relevance", "depth", "communication", "examples"].map(dim => (
                                            <div key={dim} className="flex items-center gap-1.5">
                                                <div className={`w-2 h-2 rounded-full ${dimColors[dim]}`}/>
                                                <span className="text-slate-500 text-xs capitalize">{dim}</span>
                                                <span className="text-white text-xs font-bold">{ex.evaluation[dim + "_score"]}/10</span>
                                            </div>
                                        ))}
                                    </div>
                                    {ex.evaluation.strengths && ex.evaluation.strengths.length > 0 && (
                                        <p className="text-emerald-400/70 text-xs mt-1">+ {(Array.isArray(ex.evaluation.strengths) ? ex.evaluation.strengths : [ex.evaluation.strengths]).join(", ")}</p>
                                    )}
                                    {ex.evaluation.suggestions && ex.evaluation.suggestions.length > 0 && (
                                        <p className="text-amber-400/70 text-xs mt-1">Tip: {(Array.isArray(ex.evaluation.suggestions) ? ex.evaluation.suggestions : [ex.evaluation.suggestions]).join(", ")}</p>
                                    )}
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

function App() {
    const [authState, setAuthState] = useState("checking"); // checking, login, register, change_password, authenticated
    const [screen, setScreen] = useState("dashboard");
    const [screenParams, setScreenParams] = useState({});
    const [user, setUserState] = useState(null);
    const [error, setError] = useState(null);

    // Interview state
    const [sessionId, setSessionId] = useState(null);
    const [questions, setQuestions] = useState([]);
    const [engine, setEngine] = useState("whisper");
    const [scorecard, setScorecard] = useState(null);
    const [questionReview, setQuestionReview] = useState([]);
    const [audioUrls, setAudioUrls] = useState({});

    useEffect(() => {
        const token = getToken();
        const savedUser = getUser();
        if (token && savedUser) {
            setUserState(savedUser);
            if (savedUser.is_first_login) setAuthState("change_password");
            else setAuthState("authenticated");
        } else {
            setAuthState("login");
        }
    }, []);

    const handleLogin = (data) => {
        setToken(data.token);
        setUser(data);
        setUserState(data);
        if (data.is_first_login) {
            setAuthState("change_password");
        } else {
            setAuthState("authenticated");
            setScreen("dashboard");
        }
    };

    const handleRegister = (data) => {
        // After registration, go to login
        setAuthState("login");
    };

    const handlePasswordChanged = () => {
        const u = getUser();
        if (u) { u.is_first_login = false; setUser(u); setUserState(u); }
        // v2: Route to Quick Assessment if user has target company set
        if (u && u.target_company) {
            setAuthState("quick_assessment");
        } else {
            setAuthState("authenticated");
            setScreen("dashboard");
        }
    };

    const handleQuickAssessmentComplete = (results) => {
        setAuthState("authenticated");
        setScreen("dashboard");
    };

    const handleLogout = () => {
        clearAuth();
        setAuthState("login");
        setUserState(null);
        setScreen("dashboard");
        setSessionId(null); setQuestions([]); setScorecard(null); setQuestionReview([]);
    };

    const navigate = (target, params = {}) => {
        setScreenParams(params);
        setScreen(target);
        setError(null);
    };

    // Interview handlers
    const handleStartInterview = async (name, jobTitle, selectedEngine) => {
        setError(null); setEngine(selectedEngine);
        try {
            const res = await fetch(`${API}/session/start`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ candidate_name: name, job_title: jobTitle }) });
            const data = await res.json();
            setSessionId(data.session_id);
            const qRes = await fetch(`${API}/questions?session_id=${data.session_id}`, { headers: authHeaders() });
            const qData = await qRes.json();
            setQuestions(qData);
            setScreen("interview_room");
        } catch { setError("Cannot connect to backend."); }
    };

    const handleStartJDInterview = async (name, jobDescription, selectedEngine) => {
        setError(null); setEngine(selectedEngine);
        try {
            const res = await fetch(`${API}/session/start-jd`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ candidate_name: name, job_description: jobDescription }) });
            const data = await res.json();
            if (!res.ok) { setError(data.error || "Failed to generate questions"); return; }
            setSessionId(data.session_id);
            const qRes = await fetch(`${API}/questions?session_id=${data.session_id}`, { headers: authHeaders() });
            const qData = await qRes.json();
            setQuestions(qData);
            setScreen("interview_room");
        } catch { setError("Cannot connect to backend. Make sure an LLM API key is configured."); }
    };

    const handleFinishInterview = async (timeTaken, recordedAudioUrls) => {
        setAudioUrls(recordedAudioUrls || {});
        try {
            const res = await fetch(`${API}/session/finish`, { method: "POST", headers: authHeaders(),
                body: JSON.stringify({ session_id: sessionId, time_taken: timeTaken }) });
            const data = await res.json();
            setScorecard(data.scorecard); setQuestionReview(data.question_review); setScreen("results");
        } catch { setError("Failed to get results."); }
    };

    if (authState === "checking") return <LoadingSpinner />;
    if (authState === "login") return <LoginScreen onLogin={handleLogin} onSwitchToRegister={() => setAuthState("register")} />;
    if (authState === "register") return <RegisterScreen onRegister={handleRegister} onSwitchToLogin={() => setAuthState("login")} />;
    if (authState === "change_password") return <ChangePasswordScreen onComplete={handlePasswordChanged} />;
    if (authState === "quick_assessment") return <QuickAssessmentScreen onComplete={handleQuickAssessmentComplete} onSkip={() => { setAuthState("authenticated"); setScreen("dashboard"); }} />;

    // Authenticated app
    const showNav = !["interview_room", "results", "ai_interview_room"].includes(screen);

    return (
        <div className="relative min-h-screen">
            {showNav && <NavBar screen={screen} onNavigate={navigate} onLogout={handleLogout} userName={user?.full_name || ""} />}
            {error && (
                <div className="fixed top-14 left-1/2 -translate-x-1/2 z-50 bg-red-500/20 border border-red-500/30 text-red-300 px-6 py-3 rounded-xl text-sm fade-in">
                    {error}<button onClick={() => setError(null)} className="ml-4 text-red-400 hover:text-red-300">&times;</button>
                </div>
            )}

            {screen === "dashboard" && <DashboardScreen onNavigate={navigate} />}
            {screen === "profile" && <ProfileScreen onNavigate={navigate} />}
            {screen === "history" && <SessionHistoryScreen />}
            {screen === "learning" && <LearningScreen initialTopicId={screenParams.topicId} onNavigate={navigate} />}
            {screen === "assessment" && <TopicAssessmentScreen topicId={screenParams.topicId} topicTitle={screenParams.topicTitle} onComplete={() => navigate("learning")} onNavigate={navigate} />}
            {screen === "review" && <ReviewScreen onNavigate={navigate} />}
            {screen === "interview" && <HomeScreen onStart={handleStartInterview} onStartJD={handleStartJDInterview} user={user} />}
            {screen === "interview_room" && <InterviewRoom sessionId={sessionId} questions={questions} engine={engine} onFinish={handleFinishInterview} />}
            {screen === "results" && <ResultsPage scorecard={scorecard} questionReview={questionReview} audioUrls={audioUrls} onRestart={() => navigate("dashboard")} sessionId={sessionId} />}
            {screen === "ai_interview" && <AIInterviewHub onNavigate={navigate} />}
            {screen === "ai_interview_room" && <AIInterviewRoom interviewId={screenParams.interviewId} evaluateMode={screenParams.evaluate} onNavigate={navigate} />}
            {screen === "ai_results" && <AIResultsScreen interviewId={screenParams.interviewId} onNavigate={navigate} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
